/* ---- Standalone-Betrieb (GitHub Pages): Speicher & API-Key ---- */
/* Ersetzt Claudes window.storage durch localStorage — gleiche Schnittstelle. */
window.storage = {
  async get(key) {
    const v = localStorage.getItem("teller:" + key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem("teller:" + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem("teller:" + key);
    return { key, deleted: true };
  },
};
const getApiKey = () => (localStorage.getItem("teller:apikey") || "").trim();
const setApiKeyLS = (k) => localStorage.setItem("teller:apikey", (k || "").trim());

/* ---------------- Utils ---------------- */

const pad = (n) => String(n).padStart(2, "0");
const dateKey = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const r = (n) => Math.round(Number(n) || 0);

function labelForDate(d) {
  const today = dateKey(new Date());
  const yest = dateKey(new Date(Date.now() - 86400000));
  const k = dateKey(d);
  const nice = d.toLocaleDateString("de-AT", { weekday: "short", day: "numeric", month: "long" });
  if (k === today) return `Heute, ${d.toLocaleDateString("de-AT", { day: "numeric", month: "long" })}`;
  if (k === yest) return `Gestern, ${d.toLocaleDateString("de-AT", { day: "numeric", month: "long" })}`;
  return nice;
}

function calcTargets(p) {
  const w = Number(p.weight), h = Number(p.height), a = Number(p.age);
  const bmr = p.sex === "m" ? 10 * w + 6.25 * h - 5 * a + 5 : 10 * w + 6.25 * h - 5 * a - 161;
  const act = ACTIVITIES.find((x) => x.id === p.activity)?.f || 1.375;
  const goal = GOALS.find((g) => g.id === p.goal) || GOALS[1];
  const kcal = Math.max(1200, Math.round((bmr * act + goal.delta) / 10) * 10);
  const protein = Math.round(w * (p.goal === "lose" ? 2.0 : 1.8));
  const fat = Math.round((kcal * 0.28) / 9);
  const carbs = Math.max(0, Math.round((kcal - protein * 4 - fat * 9) / 4));
  return { kcal, protein, carbs, fat };
}

function parseAIJson(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Kein JSON gefunden");
  const obj = JSON.parse(clean.slice(start, end + 1));
  if (obj.error) throw new Error(String(obj.error));
  return {
    nr: obj.nr ? String(obj.nr).trim() : "",
    name: String(obj.name || "Mahlzeit"),
    kcal: r(obj.kcal),
    protein: r(obj.protein),
    carbs: r(obj.carbs),
    fat: r(obj.fat),
    portion: obj.portion ? String(obj.portion) : "",
    note: obj.note ? String(obj.note) : "",
  };
}

async function callClaude(content, useSearch = false) {
  const key = getApiKey();
  if (!key) throw new Error("Kein API-Key hinterlegt — öffne die Einstellungen (⚙) und trag deinen Anthropic-API-Key ein.");
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: 1024,
    messages: [{ role: "user", content }],
  };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API-Fehler");
  const text = (data.content || []).map((i) => (i.type === "text" ? i.text : "")).join("\n");
  return parseAIJson(text);
}

function fileToCompressedBase64(file, maxDim = 1024) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
          resolve({ base64: dataUrl.split(",")[1], preview: dataUrl });
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error("Bild konnte nicht gelesen werden"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    reader.readAsDataURL(file);
  });
}

function Ring({ eaten, target }) {
  const size = 218, stroke = 15, rad = (size - stroke) / 2, circ = 2 * Math.PI * rad;
  const pct = target > 0 ? Math.min(1, eaten / target) : 0;
  const over = eaten > target;
  const left = target - eaten;
  return (
    <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }} aria-hidden="true">
        <circle cx={size / 2} cy={size / 2} r={rad} fill="none" stroke={COLORS.line} strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={rad} fill="none"
          stroke={over ? COLORS.berry : COLORS.green} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
          style={{ transition: "stroke-dashoffset .6s ease, stroke .3s" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div className="display" style={{ fontSize: 52, lineHeight: 1, color: over ? COLORS.berry : COLORS.ink, fontVariantNumeric: "tabular-nums" }}>
          {Math.abs(left).toLocaleString("de-AT")}
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.muted, marginTop: 4 }}>
          {over ? "kcal darüber" : "kcal übrig"}
        </div>
      </div>
    </div>
  );
}

function MacroBar({ label, val, target, color, soft }) {
  const pct = target > 0 ? Math.min(1, val / target) : 0;
  return (
    <div style={{ flex: 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 600, marginBottom: 5 }}>
        <span style={{ color: COLORS.ink }}>{label}</span>
        <span style={{ color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>{r(val)}/{target} g</span>
      </div>
      <div style={{ height: 8, borderRadius: 99, background: soft, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct * 100}%`, background: color, borderRadius: 99, transition: "width .5s ease" }} />
      </div>
    </div>
  );
}

  const [gdb, setGdb] = useState({});
  const [odb, setOdb] = useState({});
  const meal = MEALS.find((m) => m.id === mealId);

  useEffect(() => {
    (async () => {
      setGdb(await loadJSON("gourmet-menues", {}));
      setOdb(await loadJSON("meine-gerichte", {}));
    })();
  }, []);

  async function analyzePhoto(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Du bist Ernährungsexperte. Analysiere das Foto dieser Mahlzeit und schätze Portionsgröße und Nährwerte so genau wie möglich.${hint ? ` Zusatzinfo des Nutzers: ${hint}.` : ""} ${JSON_RULES}` },
      ]);
      setDraft(result);
    } catch (e) {
      setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")");
    } finally { setBusy(false); }
  }

  async function analyzeText() {
    if (!desc.trim()) return;
    setBusy(true); setErr("");
    try {
      const result = await callClaude([
        { type: "text", text: `Du bist Ernährungsexperte. Der Nutzer beschreibt, was er gegessen hat: "${desc}". Schätze die Nährwerte realistisch. ${JSON_RULES}` },
      ]);
      setDraft(result);
    } catch (e) {
      setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")");
    } finally { setBusy(false); }
  }

  async function lookupGourmet() {
    const q = gNr.trim();
    if (!q) return;
    const qn = normNr(q);
    // 1) Persönlich gespeicherte Menüs haben Vorrang (z. B. per Scan aktualisierte Werte)
    const own = await loadJSON("gourmet-menues", {});
    const ownKey = qn.length >= 3 ? Object.keys(own).find((k) => k === qn || k.endsWith(qn)) : null;
    if (ownKey) {
      setDraft({ ...own[ownKey], portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(ownKey)} — aus deiner gespeicherten Liste.`, _gnr: ownKey });
      return;
    }
    // 2) Eingebaute Sortimentsliste: Nummer (exakt oder Endung), sonst Gerichtsname
    if (qn.length >= 3) {
      const hits = Object.keys(GOURMET_DB).filter((nr) => nr === qn || nr.endsWith(qn));
      if (hits.length === 1) { setDraft(gourmetDraft(hits[0], GOURMET_DB[hits[0]], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (hits.length > 1) { setErr(`„${q}" passt auf mehrere Artikel — bitte vollständige Nummer eingeben oder unten den Treffer antippen.`); return; }
    } else if (q.length >= 3) {
      const nHits = Object.entries(GOURMET_DB).filter(([, d]) => d[0].toLowerCase().includes(q.toLowerCase()));
      if (nHits.length === 1) { setDraft(gourmetDraft(nHits[0][0], nHits[0][1], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (nHits.length > 1) { setErr(`Mehrere Treffer für „${q}" — tipp unten in der Liste das richtige Gericht an.`); return; }
    }
    // 3) Online-Suche für neue Nummern oder Gerichte, die nicht in der Liste sind
    setBusy(true); setErr("");
    try {
      const result = await callClaude([
        { type: "text", text: `Finde per Websuche die Nährwerte des GOURMET-Fertigmenüs „${q}" (GMS GOURMET GmbH, österreichische Betriebsverpflegung; Tiefkühl-Menüs für Firmen; Webshops: bestellung.gourmet.at, lieblingsspeisen.gourmet.at, gourmet-business.at). „${q}" ist die Artikelnummer oder die Bezeichnung. Gib die Werte für EINE ganze Portion (ein komplettes Menü-Tray) an, nicht pro 100 g. WICHTIG: Wenn du das Menü nicht eindeutig findest, rate NICHT irgendein Gericht, sondern antworte exakt mit {"error":"Menü nicht gefunden"}. ${JSON_RULES}` },
      ], true);
      setDraft({ ...result, _gnr: qn || normNr(result.nr) });
    } catch (e) {
      setErr(`„${q}" ist weder in der eingebauten Liste noch online eindeutig zu finden. Tipp: Packungsrückseite scannen oder Werte manuell eintragen — die App merkt sie sich dann unter der Nummer.`);
    } finally { setBusy(false); }
  }

  async function analyzePackage(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Auf dem Foto ist die Verpackung eines GOURMET-Fertigmenüs (österreichische Betriebsverpflegung). Lies Produktname und Nährwerttabelle ab. Sind die Nährwerte pro 100 g angegeben, rechne sie anhand des Füllgewichts auf die GESAMTE Portion hoch. Falls eine Artikelnummer lesbar ist, gib sie im JSON zusätzlich als Feld "nr" (String) aus, sonst "nr":"". ${JSON_RULES}` },
      ]);
      setDraft({ ...result, _gnr: gNr.trim() || result.nr || "" });
    } catch (e) {
      setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")");
    } finally { setBusy(false); }
  }

  async function removeGourmet(nr) {
    const db = await loadJSON("gourmet-menues", {});
    delete db[nr];
    await saveJSON("gourmet-menues", db);
    setGdb(db);
  }

  async function removeOwn(id) {
    const own = await loadJSON("meine-gerichte", {});
    delete own[id];
    await saveJSON("meine-gerichte", own);
    setOdb(own);
  }

  const gq = gNr.trim();
  const gqn = normNr(gq);
  const gHits = gq.length >= 2
    ? Object.entries(GOURMET_DB).filter(([nr, d]) =>
        (gqn.length >= 3 && (nr === gqn || nr.endsWith(gqn))) ||
        (gq.length >= 3 && d[0].toLowerCase().includes(gq.toLowerCase()))
      ).slice(0, 8)
    : [];

  const tabs = [
    { id: "photo", label: "📷 Foto" },
    { id: "text", label: "✏️ Text" },
    { id: "gourmet", label: "🍽️ Gourmet" },
    { id: "manual", label: "⭐ Meine" },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, background: "rgba(28,43,36,.45)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
        style={{ background: COLORS.bg, width: "100%", maxWidth: 520, maxHeight: "92vh", overflowY: "auto", borderRadius: "22px 22px 0 0", padding: "18px 20px 34px", boxSizing: "border-box" }}>
        <div style={{ width: 40, height: 4, borderRadius: 99, background: COLORS.line, margin: "0 auto 14px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <div className="display" style={{ fontSize: 24, color: COLORS.ink }}>{meal?.emoji} {meal?.label}</div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Schließen</button>
        </div>

        {draft ? (
          <ResultEditor draft={draft} setDraft={setDraft} mealId={mealId}
            onConfirm={async () => {
              const entry = { name: draft.name, kcal: r(draft.kcal), protein: r(draft.protein), carbs: r(draft.carbs), fat: r(draft.fat), id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) };
              const nr = normNr(draft._gnr);
              if (nr) {
                const db = await loadJSON("gourmet-menues", {});
                db[nr] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat };
                await saveJSON("gourmet-menues", db);
              }
              if (draft._save) {
                const own = await loadJSON("meine-gerichte", {});
                const oid = draft._ownId || "g" + Date.now().toString(36);
                own[oid] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, used: Date.now() };
                await saveJSON("meine-gerichte", own);
              } else if (draft._ownId) {
                const own = await loadJSON("meine-gerichte", {});
                if (own[draft._ownId]) { own[draft._ownId].used = Date.now(); await saveJSON("meine-gerichte", own); }
              }
              onAdd(mealId, entry);
              onClose();
            }}
            onBack={() => { setDraft(null); setPreview(null); setTab("photo"); }} />
        ) : (
          <>
            <Seg options={tabs} value={tab} onChange={(t) => { setTab(t); setErr(""); }} />
            <div style={{ marginTop: 16, display: "grid", gap: 14 }}>
              {err && <div style={{ background: COLORS.berrySoft, color: COLORS.berry, borderRadius: 12, padding: "10px 14px", fontSize: 13, lineHeight: 1.45 }}>{err}</div>}

              {busy ? (
                <div style={{ textAlign: "center", padding: "34px 0" }}>
                  {preview && <img src={preview} alt="" style={{ width: 110, height: 110, objectFit: "cover", borderRadius: 16, marginBottom: 14 }} />}
                  <div className="pulse display" style={{ fontSize: 19, color: COLORS.green }}>Claude analysiert dein Essen …</div>
                  <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 6 }}>dauert ein paar Sekunden</div>
                </div>
              ) : (
                <>
                  {tab === "photo" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Optionaler Hinweis für die KI">
                        <input style={inputStyle} value={hint} onChange={(e) => setHint(e.target.value)} placeholder="z. B. große Portion, mit Öl gebraten" />
                      </Field>
                      <button onClick={() => fileRef.current?.click()}
                        style={{ minHeight: 120, border: `2px dashed ${COLORS.green}`, borderRadius: 16, background: COLORS.greenSoft, color: COLORS.green, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                        📷 Foto aufnehmen oder auswählen
                      </button>
                      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
                        onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePhoto(f); e.target.value = ""; }} />
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Die Werte aus Fotos sind KI-Schätzungen (±20–30 %). Für exaktes Tracking kannst du sie danach anpassen.
                      </p>
                    </>
                  )}

                  {tab === "text" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Was hast du gegessen?">
                        <textarea rows={3} style={{ ...inputStyle, resize: "vertical" }} value={desc} onChange={(e) => setDesc(e.target.value)}
                          placeholder="z. B. 200 g Hähnchenbrust mit 150 g Reis und Brokkoli" />
                      </Field>
                      <button onClick={analyzeText} disabled={!desc.trim()}
                        style={{ minHeight: 52, border: "none", borderRadius: 14, background: desc.trim() ? COLORS.green : COLORS.line, color: desc.trim() ? "#fff" : COLORS.muted, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: desc.trim() ? "pointer" : "default" }}>
                        Nährwerte schätzen
                      </button>
                    </>
                  )}

                  {tab === "gourmet" && (
                    <>
                      <Field label="Artikelnummer oder Gerichtsname">
                        <input style={inputStyle} value={gNr} onChange={(e) => setGNr(e.target.value)} placeholder="z. B. 230 1148 oder Gulasch" />
                      </Field>
                      {gHits.length > 0 && (
                        <div style={{ display: "grid", gap: 6 }}>
                          {gHits.map(([nr, d]) => (
                            <button key={nr} onClick={() => setDraft(gourmetDraft(nr, d, "aus der Sortimentsliste (HW 2021/22)."))}
                              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, background: COLORS.card, borderRadius: 12, padding: "10px 12px", border: `1px solid ${COLORS.line}`, cursor: "pointer", fontFamily: "inherit", fontSize: 13, color: COLORS.ink, textAlign: "left", width: "100%" }}>
                              <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}><strong>{fmtNr(nr)}</strong> · {d[0]}</span>
                              <span style={{ color: COLORS.muted, flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>{d[1]} kcal</span>
                            </button>
                          ))}
                        </div>
                      )}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <button onClick={lookupGourmet} disabled={!gNr.trim()}
                          style={{ minHeight: 50, border: "none", borderRadius: 14, background: gNr.trim() ? COLORS.green : COLORS.line, color: gNr.trim() ? "#fff" : COLORS.muted, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: gNr.trim() ? "pointer" : "default" }}>
                          Werte holen
                        </button>
                        <button onClick={() => gFileRef.current?.click()}
                          style={{ minHeight: 50, border: `1.5px solid ${COLORS.green}`, borderRadius: 14, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                          📷 Packung scannen
                        </button>
                      </div>
                      <input ref={gFileRef} type="file" accept="image/*" style={{ display: "none" }}
                        onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePackage(f); e.target.value = ""; }} />
                      {Object.keys(gdb).length > 0 && (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Gespeicherte Menüs</div>
                          <div style={{ display: "grid", gap: 6 }}>
                            {Object.entries(gdb).sort((a, b) => a[0].localeCompare(b[0], "de", { numeric: true })).map(([nr, m]) => (
                              <div key={nr} style={{ display: "flex", alignItems: "center", gap: 8, background: COLORS.card, borderRadius: 12, padding: "10px 12px", border: `1px solid ${COLORS.line}` }}>
                                <button onClick={() => setDraft({ ...m, portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(nr)} — aus deiner gespeicherten Liste.`, _gnr: nr })}
                                  style={{ flex: 1, minWidth: 0, border: "none", background: "transparent", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: 13.5, color: COLORS.ink, padding: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                  <strong>Nr. {fmtNr(nr)}</strong> · {m.name} <span style={{ color: COLORS.muted }}>· {m.kcal} kcal</span>
                                </button>
                                <button aria-label={`Nr. ${nr} aus Liste löschen`} onClick={() => removeGourmet(nr)}
                                  style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", fontSize: 14, padding: "2px 4px", flexShrink: 0 }}>
                                  ✕
                                </button>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Die komplette Sortimentsliste (À la Carte HW 2021/22, über 260 Gerichte) ist eingebaut — Nummer oder Namen tippen genügt. Nicht dabei (neueres Sortiment)? Dann sucht Claude online, oder du scannst einmal die Packung — bestätigte Einträge merkt sich die App.
                      </p>
                    </>
                  )}

                  {tab === "manual" && (
                    <>
                      <button onClick={() => setDraft({ name: "", kcal: "", protein: "", carbs: "", fat: "", note: "", portion: "", _save: true })}
                        style={{ minHeight: 54, border: `2px dashed ${COLORS.green}`, borderRadius: 14, background: COLORS.greenSoft, color: COLORS.green, fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                        + Neues Gericht anlegen
                      </button>
                      {Object.keys(odb).length > 0 ? (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Meine Gerichte</div>
                          <div style={{ display: "grid", gap: 6 }}>
                            {Object.entries(odb).sort((a, b) => (b[1].used || 0) - (a[1].used || 0)).map(([id, m]) => (
                              <div key={id} style={{ display: "flex", alignItems: "center", gap: 8, background: COLORS.card, borderRadius: 12, padding: "10px 12px", border: `1px solid ${COLORS.line}` }}>
                                <button onClick={() => setDraft({ name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat, note: "Aus deinen gespeicherten Gerichten.", portion: "", _ownId: id })}
                                  style={{ flex: 1, minWidth: 0, border: "none", background: "transparent", textAlign: "left", cursor: "pointer", fontFamily: "inherit", fontSize: 13.5, color: COLORS.ink, padding: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                  <strong>{m.name}</strong> <span style={{ color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>· {m.kcal} kcal · {r(m.protein)}P {r(m.carbs)}K {r(m.fat)}F</span>
                                </button>
                                <button aria-label={`${m.name} aus Liste löschen`} onClick={() => removeOwn(id)}
                                  style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", fontSize: 14, padding: "2px 4px", flexShrink: 0 }}>
                                  ✕
                                </button>
                              </div>
                            ))}
                          </div>
                        </div>
                      ) : (
                        <p style={{ fontSize: 13, color: COLORS.muted, lineHeight: 1.5, margin: 0, textAlign: "center", padding: "10px 0" }}>
                          Noch keine eigenen Gerichte gespeichert.
                        </p>
                      )}
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Zuletzt gegessene Gerichte stehen oben — perfekt für Meal-Prep-Wochen. Tipp: Auch Foto-, Text- und Gourmet-Einträge kannst du vor dem Hinzufügen mit „merken" hier speichern.
                      </p>
                    </>
                  )}
                </>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

  const [t, setT] = useState({ ...profile.targets });
  const [apiKey, setApiKey] = useState(getApiKey());
  const set = (k) => (e) => setP({ ...p, [k]: e.target.value });

            Ziele neu berechnen → {recalced.kcal.toLocaleString("de-AT")} kcal
          </button>

          <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.muted, marginTop: 6, textTransform: "uppercase", letterSpacing: ".05em" }}>Tagesziele (manuell anpassbar)</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Kalorien" suffix="kcal"><input type="number" style={inputStyle} value={t.kcal} onChange={setTarget("kcal")} /></Field>
            <Field label="Protein" suffix="g"><input type="number" style={inputStyle} value={t.protein} onChange={setTarget("protein")} /></Field>
            <Field label="Kohlenhydrate" suffix="g"><input type="number" style={inputStyle} value={t.carbs} onChange={setTarget("carbs")} /></Field>
            <Field label="Fett" suffix="g"><input type="number" style={inputStyle} value={t.fat} onChange={setTarget("fat")} /></Field>
          </div>

          <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.muted, marginTop: 6, textTransform: "uppercase", letterSpacing: ".05em" }}>KI-Analyse (optional)</div>
          <Field label="Anthropic API-Key">
            <input type="password" autoComplete="off" style={inputStyle} value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..." />
          </Field>
          <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: "-6px 0 0" }}>
            Der Key wird nur lokal auf diesem Gerät gespeichert und direkt an die Anthropic-API geschickt — nirgendwo sonst hin. Er ermöglicht Foto-/Text-Analyse und die Gourmet-Onlinesuche. Ohne Key funktionieren Sortimentsliste, Meine Gerichte und manuelle Einträge trotzdem voll.
          </p>

          <button onClick={() => { setApiKeyLS(apiKey); onSave({ ...p, targets: { kcal: r(t.kcal), protein: r(t.protein), carbs: r(t.carbs), fat: r(t.fat) } }); }}
            style={{ minHeight: 54, border: "none", borderRadius: 14, background: COLORS.green, color: "#fff", fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
            Speichern
          </button>
        </div>
      </div>
    </div>
  );
}

function TellerApp() {
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [date, setDate] = useState(new Date());
  const [day, setDay] = useState(emptyDay());
  const [sheet, setSheet] = useState(null); // mealId | null
  const [showSettings, setShowSettings] = useState(false);
  const key = dateKey(date);

  useEffect(() => {
    (async () => {
      const p = await loadJSON("profile", null);
      setProfile(p);
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    (async () => setDay(await loadJSON("day:" + key, emptyDay())))();
  }, [key]);

  async function addEntry(mealId, entry) {
    const next = { ...day, meals: { ...day.meals, [mealId]: [...(day.meals[mealId] || []), entry] } };
    setDay(next);
    await saveJSON("day:" + key, next);
  }
  async function removeEntry(mealId, id) {
    const next = { ...day, meals: { ...day.meals, [mealId]: (day.meals[mealId] || []).filter((e) => e.id !== id) } };
    setDay(next);
    await saveJSON("day:" + key, next);
  }
  async function saveProfile(p) {
    setProfile(p);
    await saveJSON("profile", p);
    setShowSettings(false);
  }

  const shell = (children) => (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.ink, fontFamily: "'Instrument Sans', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Instrument+Sans:wght@400;600;700&display=swap');
        .display { font-family: 'Fraunces', Georgia, serif; font-weight: 600; }
        .pulse { animation: pulse 1.4s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .45 } }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2.5px solid ${COLORS.amber}; outline-offset: 2px; }
        input:focus, select:focus, textarea:focus { border-color: ${COLORS.green}; }
        @media (prefers-reduced-motion: reduce) { *, .pulse { animation: none !important; transition: none !important; } }
      `}</style>
      {children}
    </div>
  );

  if (loading) return shell(<div className="pulse display" style={{ textAlign: "center", paddingTop: 120, fontSize: 22, color: COLORS.green }}>Teller lädt …</div>);
  if (!profile) return shell(<Onboarding onDone={saveProfile} />);

  const targets = profile.targets;
  const all = MEALS.flatMap((m) => day.meals[m.id] || []);
  const sum = (k) => all.reduce((a, e) => a + (Number(e[k]) || 0), 0);
  const eaten = sum("kcal");

  return shell(
    <div style={{ maxWidth: 460, margin: "0 auto", padding: "18px 18px 60px" }}>
      {/* Kopf: Datum + Einstellungen */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
        <button aria-label="Vorheriger Tag" onClick={() => setDate(new Date(date.getTime() - 86400000))} style={navBtn}>‹</button>
        <div style={{ textAlign: "center" }}>
          <div className="display" style={{ fontSize: 19 }}>{labelForDate(date)}</div>
          {dateKey(date) !== dateKey(new Date()) && (
            <button onClick={() => setDate(new Date())} style={{ border: "none", background: "transparent", color: COLORS.green, fontSize: 12.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: 2 }}>
              zu heute springen
            </button>
          )}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button aria-label="Nächster Tag" onClick={() => setDate(new Date(date.getTime() + 86400000))} style={navBtn}>›</button>
          <button aria-label="Einstellungen" onClick={() => setShowSettings(true)} style={navBtn}>⚙</button>
        </div>
      </div>

      {/* Ring */}
      <div style={{ background: COLORS.card, borderRadius: 22, padding: "26px 20px 22px", boxShadow: "0 1px 3px rgba(28,43,36,.06)" }}>
        <Ring eaten={eaten} target={targets.kcal} />
        <div style={{ display: "flex", justifyContent: "center", gap: 26, marginTop: 16, fontSize: 13.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>
          <span><strong style={{ color: COLORS.ink }}>{eaten.toLocaleString("de-AT")}</strong> gegessen</span>
          <span>Ziel <strong style={{ color: COLORS.ink }}>{targets.kcal.toLocaleString("de-AT")}</strong></span>
        </div>
        <div style={{ display: "flex", gap: 14, marginTop: 20 }}>
          <MacroBar label="Protein" val={sum("protein")} target={targets.protein} color={COLORS.green} soft={COLORS.greenSoft} />
          <MacroBar label="Kohlenh." val={sum("carbs")} target={targets.carbs} color={COLORS.amber} soft={COLORS.amberSoft} />
          <MacroBar label="Fett" val={sum("fat")} target={targets.fat} color={COLORS.berry} soft={COLORS.berrySoft} />
        </div>
      </div>

      {/* Mahlzeiten */}
      <div style={{ display: "grid", gap: 12, marginTop: 16 }}>
        {MEALS.map((m) => {
          const entries = day.meals[m.id] || [];
          const mealKcal = entries.reduce((a, e) => a + (Number(e.kcal) || 0), 0);
          const budget = Math.round(targets.kcal * m.share);
          return (
            <div key={m.id} style={{ background: COLORS.card, borderRadius: 18, padding: "14px 16px", boxShadow: "0 1px 3px rgba(28,43,36,.05)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 15.5, fontWeight: 700 }}>{m.emoji} {m.label}</div>
                  <div style={{ fontSize: 12.5, color: mealKcal > budget ? COLORS.berry : COLORS.muted, fontVariantNumeric: "tabular-nums", marginTop: 2 }}>
                    {mealKcal.toLocaleString("de-AT")} / {budget.toLocaleString("de-AT")} kcal empfohlen
                  </div>
                </div>
                <button aria-label={`${m.label}: Essen hinzufügen`} onClick={() => setSheet(m.id)}
                  style={{ width: 42, height: 42, borderRadius: 99, border: "none", background: COLORS.green, color: "#fff", fontSize: 22, lineHeight: 1, cursor: "pointer", flexShrink: 0 }}>
                  +
                </button>
              </div>
              {entries.length > 0 && (
                <div style={{ marginTop: 10, borderTop: `1px solid ${COLORS.line}`, paddingTop: 8, display: "grid", gap: 6 }}>
                  {entries.map((e) => (
                    <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5 }}>
                      <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.name}</span>
                      <span style={{ color: COLORS.muted, fontVariantNumeric: "tabular-nums", flexShrink: 0 }}>
                        {r(e.kcal)} kcal · {r(e.protein)}P {r(e.carbs)}K {r(e.fat)}F
                      </span>
                      <button aria-label={`${e.name} entfernen`} onClick={() => removeEntry(m.id, e.id)}
                        style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 15, cursor: "pointer", padding: "2px 4px", flexShrink: 0 }}>
                        ✕
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <p style={{ textAlign: "center", fontSize: 12, color: COLORS.muted, marginTop: 22, lineHeight: 1.5 }}>
        Foto- und Textwerte sind KI-Schätzungen — als Trend über Tage hinweg zuverlässig, im Einzelfall gerne nachjustieren.
      </p>

      {sheet && <AddSheet mealId={sheet} onAdd={addEntry} onClose={() => setSheet(null)} />}
      {showSettings && <Settings profile={profile} onSave={saveProfile} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

const navBtn = {
  width: 40, height: 40, borderRadius: 12, border: `1.5px solid ${COLORS.line}`,
  background: COLORS.card, color: COLORS.ink, fontSize: 18, cursor: "pointer",
  display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit",
};

ReactDOM.createRoot(document.getElementById("root")).render(<TellerApp />);
</script>
</body>
</html>
