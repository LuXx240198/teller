<!-- Service Worker: automatische Updates beim nächsten Öffnen -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      var hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.register("sw.js").catch(function () {});
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        // Nur bei einem echten Update neu laden, nicht bei der Erstinstallation.
        if (refreshing || !hadController) return;
        refreshing = true;
        location.reload();
      });
    });
  }
</script>

const pad = (n) => String(n).padStart(2, "0");

function labelForDate(d) {
  const today = dateKey(new Date());
  const yest = dateKey(new Date(Date.now() - 86400000));
  const k = dateKey(d);
  const short = d.toLocaleDateString("de-AT", { day: "numeric", month: "long" });
  if (k === today) return `Heute, ${short}`;
  if (k === yest) return `Gestern, ${short}`;
  return d.toLocaleDateString("de-AT", { weekday: "short", day: "numeric", month: "long" });
}

function weekDates(d) {
  const day = (d.getDay() + 6) % 7; // Montag = 0
  const mon = new Date(d); mon.setHours(0, 0, 0, 0); mon.setDate(d.getDate() - day);
  return Array.from({ length: 7 }, (_, i) => { const x = new Date(mon); x.setDate(mon.getDate() + i); return x; });
}
function monthDates(year, month) {
  const days = new Date(year, month + 1, 0).getDate();
  return Array.from({ length: days }, (_, i) => new Date(year, month, i + 1));
}

/* Alte Profile auf das neue Schema heben (ohne die gespeicherten Ziele zu ändern) */
function migrateProfile(p) {
  if (!p) return p;
  if (!p.alltag) {
    const map = { "1.2": "min", "1.375": "light", "1.55": "mod", "1.725": "active" };
    p.alltag = map[p.activity] || "light";
  }
  if (!p.sportFreq) p.sportFreq = "none";
  if (!p.sportType) p.sportType = "mixed";
  if (!p.energy) p.energy = "normal";
  if (p.metab == null) p.metab = 0;
  if (p.targetWeight == null) p.targetWeight = "";
  if (p.weekBudget == null) p.weekBudget = false;
  if (p.waterGoal == null) p.waterGoal = "";
  return p;
}

function derivedWaterGoal(p) {
  const w = Number(p && p.weight) || 0;
  if (p && p.waterGoal) return r(p.waterGoal);
  if (!w) return 2500;
  return Math.min(4000, Math.max(1500, Math.round((w * 35) / 100) * 100));
}

function calcTargets(p) {
  const w = Number(p.weight) || 0, h = Number(p.height) || 0, a = Number(p.age) || 0;
  const bmr = p.sex === "m" ? 10 * w + 6.25 * h - 5 * a + 5 : 10 * w + 6.25 * h - 5 * a - 161;
  const alltag = (ALLTAG.find((x) => x.id === p.alltag) || {}).f || 1.375;
  const sport = (SPORT_FREQ.find((x) => x.id === p.sportFreq) || {}).bonus || 0;
  const pal = alltag + sport;
  const energy = (ENERGY.find((x) => x.id === p.energy) || {}).adj || 0;
  const metab = (Number(p.metab) || 0) / 100;
  const goal = GOALS.find((g) => g.id === p.goal) || GOALS[1];
  let kcal = bmr * pal * (1 + energy) * (1 + metab) + goal.delta;
  kcal = Math.max(1200, Math.round(kcal / 10) * 10);
  let pgkg = p.goal === "lose" ? 2.0 : 1.8;
  if (p.sportType === "strength") pgkg += 0.2;
  else if (p.sportType === "mixed") pgkg += 0.1;
  const protein = Math.round(w * pgkg);
  const fat = Math.round((kcal * 0.28) / 9);
  const carbs = Math.max(0, Math.round((kcal - protein * 4 - fat * 9) / 4));
  return { kcal, protein, carbs, fat };
}

function parseAIJson(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Kein JSON gefunden");
  const obj = JSON.parse(clean.slice(start, end + 1));
  if (obj.error) throw new Error(String(obj.error));
  return {
    nr: obj.nr ? String(obj.nr).trim() : "",
    name: String(obj.name || "Mahlzeit"),
    kcal: r(obj.kcal), protein: r(obj.protein), carbs: r(obj.carbs), fat: r(obj.fat),
    portion: obj.portion ? String(obj.portion) : "",
    note: obj.note ? String(obj.note) : "",
  };
}

async function callClaude(content, useSearch = false) {
  const key = getApiKey();
  if (!key) throw new Error("Kein API-Key hinterlegt — öffne die Einstellungen (⚙) und trag deinen Anthropic-API-Key ein.");
  const body = { model: "claude-sonnet-4-6", max_tokens: 1024, messages: [{ role: "user", content }] };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json", "x-api-key": key,
      "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API-Fehler");
  const text = (data.content || []).map((i) => (i.type === "text" ? i.text : "")).join("\n");
  return parseAIJson(text);
}

function fileToCompressedBase64(file, maxDim = 1024) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
          resolve({ base64: dataUrl.split(",")[1], preview: dataUrl });
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error("Bild konnte nicht gelesen werden"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    reader.readAsDataURL(file);
  });
}

function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("teller:") && k !== "teller:apikey") data[k] = localStorage.getItem(k);
  }
  const blob = new Blob([JSON.stringify({ app: "teller", version: 2, exported: new Date().toISOString(), data }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "teller-backup-" + dateKey(new Date()) + ".json"; a.click();
  URL.revokeObjectURL(url);
}
function importData(file, onDone) {
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const obj = JSON.parse(rd.result);
      const d = obj.data || obj;
      let n = 0;
      Object.keys(d).forEach((k) => { if (k.startsWith("teller:")) { localStorage.setItem(k, d[k]); n++; } });
      onDone(true, n);
    } catch (e) { onDone(false, 0, e.message); }
  };
  rd.readAsText(file);
}

function Ring({ eaten, target }) {
  const size = 220, stroke = 16, rad = (size - stroke) / 2, circ = 2 * Math.PI * rad;
  const pct = target > 0 ? Math.min(1, eaten / target) : 0;
  const over = eaten > target;
  const left = target - eaten;
  return (
    <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }} aria-hidden="true">
        <circle cx={size / 2} cy={size / 2} r={rad} fill="none" stroke="var(--green-soft)" strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={rad} fill="none"
          stroke={over ? "var(--berry)" : "var(--green)"} strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
          style={{ transition: "stroke-dashoffset .6s ease, stroke .3s" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div className="display" style={{ fontSize: 52, lineHeight: 1, color: over ? "var(--berry)" : "var(--ink)", fontVariantNumeric: "tabular-nums" }}>
          {nf(Math.abs(left))}
        </div>
        <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.muted, marginTop: 4 }}>
          {over ? "kcal darüber" : "kcal übrig"}
        </div>
      </div>
    </div>
  );
}

function AddSheet({ mealId, onAdd, onClose }) {
  const [tab, setTab] = useState("photo");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [draft, setDraft] = useState(null);
  const [desc, setDesc] = useState("");
  const [hint, setHint] = useState("");
  const [preview, setPreview] = useState(null);
  const fileRef = useRef(null);
  const gFileRef = useRef(null);
  const [gNr, setGNr] = useState("");
  const [jq, setJq] = useState("");
  const [gdb, setGdb] = useState({});
  const [odb, setOdb] = useState({});
  const meal = MEALS.find((m) => m.id === mealId);

  useEffect(() => { (async () => { setGdb(await loadJSON("gourmet-menues", {})); setOdb(await loadJSON("meine-gerichte", {})); })(); }, []);

  async function analyzePhoto(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Du bist Ernährungsexperte. Analysiere das Foto dieser Mahlzeit und schätze Portionsgröße und Nährwerte so genau wie möglich.${hint ? ` Zusatzinfo des Nutzers: ${hint}.` : ""} ${JSON_RULES}` },
      ]);
      setDraft(result);
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function analyzeText() {
    if (!desc.trim()) return;
    setBusy(true); setErr("");
    try {
      const result = await callClaude([{ type: "text", text: `Du bist Ernährungsexperte. Der Nutzer beschreibt, was er gegessen hat: "${desc}". Schätze die Nährwerte realistisch. ${JSON_RULES}` }]);
      setDraft(result);
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function lookupGourmet() {
    const q = gNr.trim(); if (!q) return;
    const qn = normNr(q);
    const own = await loadJSON("gourmet-menues", {});
    const ownKey = qn.length >= 3 ? Object.keys(own).find((k) => k === qn || k.endsWith(qn)) : null;
    if (ownKey) { setDraft({ ...own[ownKey], portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(ownKey)} — aus deiner gespeicherten Liste.`, _gnr: ownKey }); return; }
    if (qn.length >= 3) {
      const hits = GOURMET_DB_KEYS.filter((nr) => nr === qn || nr.endsWith(qn));
      if (hits.length === 1) { setDraft(gourmetDraft(hits[0], GOURMET_DB[hits[0]], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (hits.length > 1) { setErr(`„${q}" passt auf mehrere Artikel — bitte vollständige Nummer eingeben oder unten antippen.`); return; }
    } else if (q.length >= 3) {
      const nHits = Object.entries(GOURMET_DB).filter(([, d]) => d[0].toLowerCase().includes(q.toLowerCase()));
      if (nHits.length === 1) { setDraft(gourmetDraft(nHits[0][0], nHits[0][1], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (nHits.length > 1) { setErr(`Mehrere Treffer für „${q}" — tipp unten das richtige Gericht an.`); return; }
    }
    setBusy(true); setErr("");
    try {
      const result = await callClaude([{ type: "text", text: `Finde per Websuche die Nährwerte des GOURMET-Fertigmenüs „${q}" (GMS GOURMET GmbH, österreichische Betriebsverpflegung; Webshops: bestellung.gourmet.at, lieblingsspeisen.gourmet.at, gourmet-business.at). „${q}" ist Artikelnummer oder Bezeichnung. Gib die Werte für EINE ganze Portion an, nicht pro 100 g. WICHTIG: Wenn du das Menü nicht eindeutig findest, antworte exakt mit {"error":"Menü nicht gefunden"}. ${JSON_RULES}` }], true);
      setDraft({ ...result, _gnr: qn || normNr(result.nr) });
    } catch (e) { setErr(`„${q}" ist weder eingebaut noch online eindeutig zu finden. Tipp: Packung scannen oder manuell eintragen — die App merkt sich den Eintrag dann.`); }
    finally { setBusy(false); }
  }
  async function analyzePackage(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Auf dem Foto ist die Verpackung eines GOURMET-Fertigmenüs. Lies Produktname und Nährwerttabelle ab. Sind die Werte pro 100 g, rechne sie anhand des Füllgewichts auf die GESAMTE Portion hoch. Falls eine Artikelnummer lesbar ist, gib sie als "nr" (String) aus, sonst "nr":"". ${JSON_RULES}` },
      ]);
      setDraft({ ...result, _gnr: gNr.trim() || result.nr || "" });
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function removeGourmet(nr) { const db = await loadJSON("gourmet-menues", {}); delete db[nr]; await saveJSON("gourmet-menues", db); setGdb(db); }
  async function removeOwn(id) { const own = await loadJSON("meine-gerichte", {}); delete own[id]; await saveJSON("meine-gerichte", own); setOdb(own); }

  const gq = gNr.trim(); const gqn = normNr(gq);
  const gHits = gq.length >= 2 ? Object.entries(GOURMET_DB).filter(([nr, d]) =>
    (gqn.length >= 3 && (nr === gqn || nr.endsWith(gqn))) || (gq.length >= 3 && d[0].toLowerCase().includes(gq.toLowerCase()))).slice(0, 8) : [];
  const jqt = jq.trim().toLowerCase();
  const juitHits = jqt.length === 0 ? JUIT_DB : JUIT_DB.filter((d) => d[0].toLowerCase().includes(jqt) || d[1].toLowerCase().includes(jqt));

  const tabs = [
    { id: "photo", label: "Foto" }, { id: "text", label: "Text" },
    { id: "gourmet", label: "Gourmet" }, { id: "juit", label: "Juit" }, { id: "manual", label: "Meine" },
  ];

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(10,20,15,.5)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div className="sheet-in thin-scroll" onClick={(e) => e.stopPropagation()}
        style={{ background: COLORS.bg, width: "100%", maxWidth: 520, maxHeight: "92vh", overflowY: "auto", borderRadius: "24px 24px 0 0", padding: "16px 18px calc(28px + env(safe-area-inset-bottom))", boxSizing: "border-box" }}>
        <div style={{ width: 42, height: 4, borderRadius: 99, background: COLORS.line, margin: "0 auto 14px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <div className="display" style={{ fontSize: 23, color: COLORS.ink }}>{meal?.emoji} {meal?.label}</div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Schließen</button>
        </div>

        {draft ? (
          <ResultEditor draft={draft} setDraft={setDraft} mealId={mealId}
            onConfirm={async () => {
              const entry = { name: draft.name, kcal: r(draft.kcal), protein: r(draft.protein), carbs: r(draft.carbs), fat: r(draft.fat), id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) };
              const nr = normNr(draft._gnr);
              if (nr) { const db = await loadJSON("gourmet-menues", {}); db[nr] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat }; await saveJSON("gourmet-menues", db); }
              if (draft._save) { const own = await loadJSON("meine-gerichte", {}); const oid = draft._ownId || "g" + Date.now().toString(36); own[oid] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, used: Date.now() }; await saveJSON("meine-gerichte", own); }
              else if (draft._ownId) { const own = await loadJSON("meine-gerichte", {}); if (own[draft._ownId]) { own[draft._ownId].used = Date.now(); await saveJSON("meine-gerichte", own); } }
              onAdd(mealId, entry); onClose();
            }}
            onBack={() => { setDraft(null); setPreview(null); }} />
        ) : (
          <>
            <Seg small options={tabs} value={tab} onChange={(t) => { setTab(t); setErr(""); }} />
            <div style={{ marginTop: 16, display: "grid", gap: 14 }}>
              {err && <div style={{ background: COLORS.berrySoft, color: COLORS.berry, borderRadius: 12, padding: "10px 14px", fontSize: 13, lineHeight: 1.45 }}>{err}</div>}
              {busy ? (
                <div style={{ textAlign: "center", padding: "34px 0" }}>
                  {preview && <img src={preview} alt="" style={{ width: 110, height: 110, objectFit: "cover", borderRadius: 16, marginBottom: 14 }} />}
                  <div className="pulse display" style={{ fontSize: 19, color: COLORS.green }}>Claude analysiert dein Essen …</div>
                  <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 6 }}>dauert ein paar Sekunden</div>
                </div>
              ) : (
                <>
                  {tab === "photo" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Optionaler Hinweis für die KI">
                        <input style={inputStyle} value={hint} onChange={(e) => setHint(e.target.value)} placeholder="z. B. große Portion, mit Öl gebraten" />
                      </Field>
                      <button onClick={() => fileRef.current?.click()}
                        style={{ minHeight: 120, border: "2px dashed var(--green)", borderRadius: 16, background: COLORS.greenSoft, color: COLORS.green, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                        📷 Foto aufnehmen oder auswählen
                      </button>
                      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePhoto(f); e.target.value = ""; }} />
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>Fotowerte sind KI-Schätzungen (±20–30 %). Danach anpassbar.</p>
                    </>
                  )}
                  {tab === "text" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Was hast du gegessen?">
                        <textarea rows={3} style={{ ...inputStyle, resize: "vertical" }} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="z. B. 200 g Hähnchenbrust mit 150 g Reis und Brokkoli" />
                      </Field>
                      <button onClick={analyzeText} disabled={!desc.trim()}
                        style={{ minHeight: 52, border: "none", borderRadius: 14, background: desc.trim() ? COLORS.green : COLORS.line, color: desc.trim() ? COLORS.onAccent : COLORS.muted, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: desc.trim() ? "pointer" : "default" }}>
                        Nährwerte schätzen
                      </button>
                    </>
                  )}
                  {tab === "gourmet" && (
                    <>
                      <Field label="Artikelnummer oder Gerichtsname">
                        <input style={inputStyle} value={gNr} onChange={(e) => setGNr(e.target.value)} placeholder="z. B. 230 1148 oder Gulasch" />
                      </Field>
                      {gHits.length > 0 && (
                        <div style={{ display: "grid", gap: 6 }}>
                          {gHits.map(([nr, d]) => (
                            <ListRow key={nr} onPick={() => setDraft(gourmetDraft(nr, d, "aus der Sortimentsliste (HW 2021/22)."))}>
                              <span style={{ display: "flex", justifyContent: "space-between", gap: 8, fontSize: 13 }}>
                                <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}><strong>{fmtNr(nr)}</strong> · {d[0]}</span>
                                <span style={{ color: COLORS.muted, flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>{d[1]} kcal</span>
                              </span>
                            </ListRow>
                          ))}
                        </div>
                      )}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <button onClick={lookupGourmet} disabled={!gNr.trim()}
                          style={{ minHeight: 50, border: "none", borderRadius: 14, background: gNr.trim() ? COLORS.green : COLORS.line, color: gNr.trim() ? COLORS.onAccent : COLORS.muted, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: gNr.trim() ? "pointer" : "default" }}>Werte holen</button>
                        <button onClick={() => gFileRef.current?.click()}
                          style={{ minHeight: 50, border: "1.5px solid var(--green)", borderRadius: 14, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>📷 Packung scannen</button>
                      </div>
                      <input ref={gFileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePackage(f); e.target.value = ""; }} />
                      {Object.keys(gdb).length > 0 && (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Gespeicherte Menüs</div>
                          <div style={{ display: "grid", gap: 6 }}>
                            {Object.entries(gdb).sort((a, b) => a[0].localeCompare(b[0], "de", { numeric: true })).map(([nr, m]) => (
                              <ListRow key={nr} delLabel={`Nr. ${nr} löschen`} onDelete={() => removeGourmet(nr)}
                                onPick={() => setDraft({ ...m, portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(nr)} — aus deiner gespeicherten Liste.`, _gnr: nr })}>
                                <span style={{ fontSize: 13.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}>
                                  <strong>Nr. {fmtNr(nr)}</strong> · {m.name} <span style={{ color: COLORS.muted }}>· {m.kcal} kcal</span>
                                </span>
                              </ListRow>
                            ))}
                          </div>
                        </div>
                      )}
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>

/* ---------------- Gewicht ---------------- */

function WeightChart({ entries, target }) {
  const W = 320, H = 150, padL = 8, padR = 8, padT = 12, padB = 20;
  const pts = entries.map((e) => ({ t: new Date(e.d).getTime(), kg: Number(e.kg) }));
  const minT = pts[0].t, maxT = pts[pts.length - 1].t;
  const spanT = Math.max(1, maxT - minT);
  const kgs = pts.map((p) => p.kg).concat(target ? [Number(target)] : []);
  let minK = Math.min(...kgs), maxK = Math.max(...kgs);
  if (maxK - minK < 2) { minK -= 1; maxK += 1; }
  const spanK = maxK - minK;
  const x = (t) => padL + ((t - minT) / spanT) * (W - padL - padR);
  const y = (kg) => padT + (1 - (kg - minK) / spanK) * (H - padT - padB);
  const line = pts.map((p, i) => `${i ? "L" : "M"}${x(p.t).toFixed(1)},${y(p.kg).toFixed(1)}`).join(" ");
  const ty = target ? y(Number(target)) : null;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: "block" }} preserveAspectRatio="none">
      {ty != null && ty > padT && ty < H - padB && (
        <g>
          <line x1={padL} y1={ty} x2={W - padR} y2={ty} stroke="var(--amber)" strokeWidth="1.4" strokeDasharray="5 4" />
          <text x={W - padR} y={ty - 4} textAnchor="end" fontSize="10" fill="var(--amber)">Ziel {target} kg</text>
        </g>
      )}
      <path d={line} fill="none" stroke="var(--green)" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />
      {pts.map((p, i) => <circle key={i} cx={x(p.t)} cy={y(p.kg)} r={i === pts.length - 1 ? 4 : 2.6} fill="var(--green)" />)}
    </svg>
  );
}

function WeightTab({ profile }) {
  const [entries, setEntries] = useState([]);
  const [kg, setKg] = useState("");
  const [d, setD] = useState(dateKey(new Date()));
  useEffect(() => { (async () => setEntries(await loadJSON("weights", [])))(); }, []);

  async function add() {
    const v = parseFloat(String(kg).replace(",", "."));
    if (!v || !d) return;
    const next = [...entries.filter((e) => e.d !== d), { d, kg: v }].sort((a, b) => a.d.localeCompare(b.d));
    setEntries(next); await saveJSON("weights", next); setKg("");
  }
  async function del(dk) { const next = entries.filter((e) => e.d !== dk); setEntries(next); await saveJSON("weights", next); }

  const sorted = entries;
  const start = sorted[0], current = sorted[sorted.length - 1];
  const change = start && current ? current.kg - start.kg : 0;
  const target = profile.targetWeight ? Number(profile.targetWeight) : null;

  // lineare Regression für Wochentrend
  let prognosis = null;
  if (sorted.length >= 2) {
    const t0 = new Date(sorted[0].d).getTime();
    const xs = sorted.map((e) => (new Date(e.d).getTime() - t0) / 86400000);
    const ys = sorted.map((e) => e.kg);
    const n = xs.length, sx = xs.reduce((a, b) => a + b, 0), sy = ys.reduce((a, b) => a + b, 0);
    const sxx = xs.reduce((a, b) => a + b * b, 0), sxy = xs.reduce((a, b, i) => a + b * ys[i], 0);
    const denom = n * sxx - sx * sx;
    const slope = denom !== 0 ? (n * sxy - sx * sy) / denom : 0; // kg pro Tag
    const perWeek = slope * 7;
    if (target != null && current) {
      const need = target - current.kg;
      const ok = (need < 0 && slope < -0.0005) || (need > 0 && slope > 0.0005);
      const reached = Math.abs(need) < 0.3;
      if (reached) prognosis = { perWeek, text: "Zielgewicht praktisch erreicht 🎉", reached: true };
      else if (ok) {
        const weeks = need / perWeek;
        const date = new Date(Date.now() + weeks * 7 * 86400000);
        prognosis = { perWeek, weeks: Math.ceil(weeks), date, text: null };
      } else prognosis = { perWeek, text: "Aktueller Trend führt nicht Richtung Ziel.", off: true };
    } else prognosis = { perWeek, text: target == null ? "Trag ein Zielgewicht ein für eine Prognose." : null };
  }

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 12 }}>Gewicht eintragen</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Datum"><input type="date" style={inputStyle} value={d} max={dateKey(new Date())} onChange={(e) => setD(e.target.value)} /></Field>
          <Field label="Gewicht" suffix="kg"><input type="number" inputMode="decimal" style={inputStyle} value={kg} onChange={(e) => setKg(e.target.value)} placeholder="77,5" /></Field>
          <button onClick={add} disabled={!kg} style={{ minHeight: 48, padding: "0 18px", border: "none", borderRadius: 12, background: kg ? COLORS.green : COLORS.line, color: kg ? COLORS.onAccent : COLORS.muted, fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: kg ? "pointer" : "default" }}>Speichern</button>
        </div>
      </Card>

      {sorted.length >= 2 ? (
        <Card>
          <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 8 }}>Verlauf</div>
          <WeightChart entries={sorted} target={target} />
          <div style={{ display: "flex", justifyContent: "space-between", textAlign: "center", marginTop: 12, gap: 8 }}>
            <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18 }}>{nf(start.kg)}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>Start</div></div>
            <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18 }}>{nf(current.kg)}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>Aktuell</div></div>
            <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18, color: change <= 0 ? "var(--green)" : "var(--berry)" }}>{change > 0 ? "+" : ""}{change.toFixed(1).replace(".", ",")}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>Änderung</div></div>
          </div>
        </Card>
      ) : (
        <Card><p style={{ margin: 0, fontSize: 13.5, color: COLORS.muted, lineHeight: 1.5, textAlign: "center" }}>Ab dem zweiten Eintrag zeige ich hier Verlauf, Änderung und eine Prognose.</p></Card>
      )}

      {prognosis && (
        <Card style={{ background: "var(--green-soft)" }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Prognose</div>
          <div style={{ fontSize: 13.5, color: COLORS.ink, lineHeight: 1.55 }}>
            Aktueller Trend: <strong>{prognosis.perWeek > 0 ? "+" : ""}{prognosis.perWeek.toFixed(2).replace(".", ",")} kg / Woche</strong>.
            {prognosis.text ? <> {prognosis.text}</> : <> Bei gleichbleibendem Tempo erreichst du dein Ziel von {target} kg in etwa <strong>{prognosis.weeks} Wochen</strong> (ca. {prognosis.date.toLocaleDateString("de-AT", { month: "long", year: "numeric" })}).</>}
          </div>
          {!prognosis.reached && <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 6 }}>Grobe Schätzung aus dem bisherigen Verlauf — schwankt bei wenigen Einträgen stark.</div>}
        </Card>
      )}

      {sorted.length > 0 && (
        <Card>
          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Einträge</div>
          <div style={{ display: "grid", gap: 6 }}>
            {[...sorted].reverse().map((e) => (
              <div key={e.d} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, padding: "4px 0" }}>
                <span style={{ flex: 1, color: COLORS.muted }}>{new Date(e.d).toLocaleDateString("de-AT", { weekday: "short", day: "numeric", month: "short", year: "numeric" })}</span>
                <span style={{ fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{nf(e.kg)} kg</span>
                <button aria-label="Eintrag löschen" onClick={() => del(e.d)} style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", display: "flex" }}><Icon d={ICONS.close} size={15} /></button>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

/* ---------------- Monatsauswertung ---------------- */

function MonthTab({ profile }) {
  const [ref, setRef] = useState(new Date());
  const [days, setDays] = useState([]);
  const year = ref.getFullYear(), month = ref.getMonth();

  useEffect(() => {
    (async () => {
      const ds = monthDates(year, month);
      const loaded = [];
      for (const d of ds) { const day = await loadJSON("day:" + dateKey(d), null); if (day) loaded.push(day); }
      setDays(loaded);
    })();
  }, [year, month]);

  const logged = days.filter((d) => dayKcal(d) > 0);
  const n = logged.length;
  const avg = (k) => (n ? Math.round(logged.reduce((a, d) => a + daySum(d, k), 0) / n) : 0);
  const t = profile.targets;
  const rows = [
    { key: "kcal", label: "Kalorien", unit: "kcal", avg: avg("kcal"), target: t.kcal },
    { key: "protein", label: "Protein", unit: "g", avg: avg("protein"), target: t.protein },
    { key: "carbs", label: "Kohlenhydrate", unit: "g", avg: avg("carbs"), target: t.carbs },
    { key: "fat", label: "Fett", unit: "g", avg: avg("fat"), target: t.fat },
  ].map((row) => {
    const diff = row.avg - row.target;
    const pct = row.target ? diff / row.target : 0;
    let flag = "ok";
    if (pct < -0.1) flag = "low";
    else if (pct > 0.1) flag = "high";
    return { ...row, diff, pct, flag };
  });

  const monthName = ref.toLocaleDateString("de-AT", { month: "long", year: "numeric" });
  const isCurrent = year === new Date().getFullYear() && month === new Date().getMonth();

  const suggest = (row) => {
    const less = Math.abs(row.diff);
    if (row.flag === "low") {
      if (row.key === "protein") return `Im Schnitt ${less} g Protein pro Tag zu wenig — mehr proteinreiche Lebensmittel (Huhn, Fisch, Quark, Hülsenfrüchte).`;
      if (row.key === "carbs") return `Im Schnitt ${less} g Kohlenhydrate pro Tag zu wenig — z. B. Vollkorn, Obst, Reis ergänzen.`;
      if (row.key === "fat") return `Im Schnitt ${less} g Fett pro Tag zu wenig — gesunde Fette wie Nüsse, Olivenöl, Avocado.`;
      return `Im Schnitt ${nf(less)} kcal pro Tag unter dem Ziel — insgesamt etwas mehr essen.`;
    }
    if (row.flag === "high") {
      if (row.key === "kcal") return `Im Schnitt ${nf(less)} kcal pro Tag über dem Ziel — Portionen oder Snacks etwas reduzieren.`;
      return `Im Schnitt ${less} ${row.unit} ${row.label} pro Tag über dem Ziel.`;
    }
    return null;
  };
  const deviations = rows.filter((r0) => r0.flag !== "ok").sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));

  const flagColor = (f) => f === "low" ? COLORS.berry : f === "high" ? COLORS.amber : COLORS.green;
  const flagText = (f) => f === "low" ? "zu wenig" : f === "high" ? "zu viel" : "im Ziel";

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button aria-label="Vormonat" onClick={() => setRef(new Date(year, month - 1, 1))} style={navBtnStyle}><Icon d={ICONS.chevL} size={18} /></button>
          <div className="display" style={{ fontSize: 18 }}>{monthName}</div>
          <button aria-label="Folgemonat" disabled={isCurrent} onClick={() => setRef(new Date(year, month + 1, 1))} style={{ ...navBtnStyle, opacity: isCurrent ? .4 : 1 }}><Icon d={ICONS.chevR} size={18} /></button>
        </div>
      </Card>

      {n === 0 ? (
        <Card><p style={{ margin: 0, fontSize: 13.5, color: COLORS.muted, lineHeight: 1.5, textAlign: "center" }}>Für {monthName} sind noch keine Einträge vorhanden.</p></Card>
      ) : (
        <>
          <Card>
            <div style={{ fontSize: 13, color: COLORS.muted, marginBottom: 12 }}>Durchschnitt über <strong style={{ color: COLORS.ink }}>{n}</strong> erfasste Tage · Vergleich mit deinen Zielen</div>
            <div style={{ display: "grid", gap: 12 }}>
              {rows.map((row) => {
                const pct = row.target ? Math.min(1, row.avg / row.target) : 0;
                return (
                  <div key={row.key}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5, gap: 8 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 600 }}>{row.label}</span>
                      <span style={{ fontSize: 12.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>
                        Ø {nf(row.avg)} / {nf(row.target)} {row.unit}
                        <span style={{ color: flagColor(row.flag), fontWeight: 700, marginLeft: 8 }}>{flagText(row.flag)}</span>
                      </span>
                    </div>
                    <div style={{ height: 8, borderRadius: 99, background: COLORS.greenSoft, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct * 100}%`, background: flagColor(row.flag), borderRadius: 99 }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          <Card>
            <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 8 }}>Zusammenfassung</div>
            {deviations.length === 0 ? (
              <p style={{ margin: 0, fontSize: 13.5, color: COLORS.ink, lineHeight: 1.55 }}>Starker Monat — alle Werte liegen im Rahmen deiner Ziele. Weiter so.</p>
            ) : (
              <div style={{ display: "grid", gap: 8 }}>
                {deviations.slice(0, 3).map((row) => (
                  <div key={row.key} style={{ display: "flex", gap: 8, fontSize: 13.5, color: COLORS.ink, lineHeight: 1.5 }}>
                    <span style={{ color: flagColor(row.flag), flexShrink: 0, fontWeight: 700 }}>•</span>
                    <span>{suggest(row)}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </>
      )}
    </div>
  );
}

          <button onClick={onClose} style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Fertig</button>
        </div>

        <div style={{ display: "grid", gap: 22 }}>
          <section style={{ display: "grid", gap: 12 }}>
            <SectionTitle>Darstellung</SectionTitle>
            <Toggle on={theme === "dark"} onClick={onToggleTheme} label={theme === "dark" ? "🌙 Dark Mode" : "☀️ Light Mode"} sub="Dunkles oder helles Design" />
          </section>

          <section style={{ display: "grid", gap: 14 }}>
            <SectionTitle>Persönliche Voraussetzungen</SectionTitle>
            <PersonalFields p={p} setP={setP} showAdvanced={adv} setShowAdvanced={setAdv} />
            <button onClick={() => setT(recalced)} style={{ minHeight: 46, border: "1.5px solid var(--green)", borderRadius: 12, background: "transparent", color: COLORS.green, fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
              Ziele neu berechnen → {nf(recalced.kcal)} kcal
            </button>
          </section>

          <section style={{ display: "grid", gap: 10 }}>
            <SectionTitle>Tagesziele (manuell anpassbar)</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <Field label="Kalorien" suffix="kcal"><input type="number" style={inputStyle} value={t.kcal} onChange={setTarget("kcal")} /></Field>
              <Field label="Protein" suffix="g"><input type="number" style={inputStyle} value={t.protein} onChange={setTarget("protein")} /></Field>
              <Field label="Kohlenhydrate" suffix="g"><input type="number" style={inputStyle} value={t.carbs} onChange={setTarget("carbs")} /></Field>
              <Field label="Fett" suffix="g"><input type="number" style={inputStyle} value={t.fat} onChange={setTarget("fat")} /></Field>
            </div>
          </section>

          <section style={{ display: "grid", gap: 12 }}>
            <SectionTitle>Zusatzfunktionen</SectionTitle>
            <Toggle on={!!p.weekBudget} onClick={() => setP({ ...p, weekBudget: !p.weekBudget })} label="Wochenbudget anzeigen" sub="Kalorien über die ganze Woche statt nur pro Tag" />
            <Field label="Wasserziel" suffix="ml, leer = aus Gewicht">
              <input type="number" inputMode="numeric" style={inputStyle} value={p.waterGoal} onChange={(e) => setP({ ...p, waterGoal: e.target.value })} placeholder={String(derivedWaterGoal(p))} />
            </Field>
          </section>

          <section style={{ display: "grid", gap: 10 }}>
            <SectionTitle>KI-Analyse (optional)</SectionTitle>
            <Field label="Anthropic API-Key">
              <input type="password" autoComplete="off" style={inputStyle} value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..." />
            </Field>
            <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: "-4px 0 0" }}>
              Nur lokal auf diesem Gerät gespeichert und direkt an die Anthropic-API geschickt. Ohne Key funktionieren Listen, eigene Gerichte und manuelle Einträge trotzdem.
            </p>
          </section>

          <section style={{ display: "grid", gap: 10 }}>
            <SectionTitle>Datensicherung</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <button onClick={() => { exportData(); setMsg("Backup wurde heruntergeladen."); }} style={{ minHeight: 48, border: "1.5px solid var(--green)", borderRadius: 12, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Daten sichern</button>
              <button onClick={() => importRef.current?.click()} style={{ minHeight: 48, border: "1.5px solid var(--line)", borderRadius: 12, background: COLORS.card, color: COLORS.ink, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Daten laden</button>
            </div>
            <input ref={importRef} type="file" accept="application/json,.json" style={{ display: "none" }}
              onChange={(e) => { const f = e.target.files?.[0]; if (f) importData(f, (ok, n, err) => { if (ok) { setMsg(`${n} Einträge geladen — App wird neu geladen …`); setTimeout(() => location.reload(), 800); } else setMsg("Import fehlgeschlagen: " + err); }); e.target.value = ""; }} />
            <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: "-2px 0 0" }}>
              Sichert alle Einträge als Datei (ohne API-Key). Wichtig vor Gerätewechsel oder falls der Browser Daten löscht.
            </p>
            {msg && <div style={{ background: COLORS.greenSoft, color: COLORS.green, borderRadius: 12, padding: "10px 14px", fontSize: 13, fontWeight: 600 }}>{msg}</div>}
          </section>

          <button onClick={() => { setApiKeyLS(apiKey); onSave({ ...p, targets: { kcal: r(t.kcal), protein: r(t.protein), carbs: r(t.carbs), fat: r(t.fat) } }); }}
            style={{ minHeight: 54, border: "none", borderRadius: 14, background: COLORS.green, color: COLORS.onAccent, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
            Speichern
          </button>
        </div>
      </div>
    </div>
  );
}

const SectionTitle = ({ children }) => (
  <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".06em" }}>{children}</div>
);

/* ---------------- Navigation ---------------- */

const navBtnStyle = {
  width: 40, height: 40, borderRadius: 12, border: "1.5px solid var(--line)",
  background: "var(--card)", color: "var(--ink)", cursor: "pointer",
  display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit",
};

function BottomNav({ view, setView }) {
  const items = [
    { id: "home", label: "Heute", d: ICONS.home },
    { id: "weight", label: "Gewicht", d: ICONS.weight },
    { id: "month", label: "Auswertung", d: ICONS.chart },
  ];
  return (
    <nav style={{ position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 40, background: "var(--nav-bg)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", borderTop: "1px solid var(--line)", paddingBottom: "env(safe-area-inset-bottom)" }}>
      <div style={{ maxWidth: 480, margin: "0 auto", display: "flex" }}>
        {items.map((it) => {
          const active = view === it.id;
          return (
            <button key={it.id} onClick={() => setView(it.id)}
              style={{ flex: 1, border: "none", background: "transparent", cursor: "pointer", padding: "9px 0 7px", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, color: active ? "var(--green)" : "var(--muted)", fontFamily: "inherit" }}>
              <Icon d={it.d} size={23} sw={active ? 2.1 : 1.8} />
              <span style={{ fontSize: 11, fontWeight: active ? 700 : 600 }}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </nav>
  );
}

/* ---------------- Haupt-App ---------------- */

function TellerApp() {
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [theme, setTheme] = useState(localStorage.getItem("teller:theme") || "light");
  const [view, setView] = useState("home");
  const [date, setDate] = useState(new Date());
  const [day, setDay] = useState(emptyDay());
  const [water, setWater] = useState(0);
  const [weekConsumed, setWeekConsumed] = useState(0);
  const [sheet, setSheet] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [undo, setUndo] = useState(null);
  const undoTimer = useRef(null);
  const key = dateKey(date);

  useEffect(() => { (async () => { setProfile(migrateProfile(await loadJSON("profile", null))); setLoading(false); })(); }, []);
  useEffect(() => { (async () => setDay(await loadJSON("day:" + key, emptyDay())))(); }, [key]);
  useEffect(() => { (async () => { const w = await loadJSON("water:" + key, 0); setWater(Number(w) || 0); })(); }, [key]);

  useEffect(() => {
    if (!profile || !profile.weekBudget) return;
    (async () => {
      const dts = weekDates(date);
      let sum = 0;
      for (const d of dts) { const dd = await loadJSON("day:" + dateKey(d), null); if (dd) sum += dayKcal(dd); }
      setWeekConsumed(sum);
    })();
  }, [key, profile, day]);

  function applyTheme(next) {
    setTheme(next);
    localStorage.setItem("teller:theme", next);
    document.documentElement.setAttribute("data-theme", next);
    const m = document.getElementById("theme-color-meta");
    if (m) m.setAttribute("content", next === "dark" ? "#101613" : "#EEF2EC");
  }

  async function addEntry(mealId, entry) {
    const next = { ...day, meals: { ...day.meals, [mealId]: [...(day.meals[mealId] || []), entry] } };
    setDay(next); await saveJSON("day:" + key, next);
  }
  async function removeEntry(mealId, id) {
    const entry = (day.meals[mealId] || []).find((e) => e.id === id);
    const next = { ...day, meals: { ...day.meals, [mealId]: (day.meals[mealId] || []).filter((e) => e.id !== id) } };
    setDay(next); await saveJSON("day:" + key, next);
    if (entry) { setUndo({ mealId, entry }); clearTimeout(undoTimer.current); undoTimer.current = setTimeout(() => setUndo(null), 5000); }
  }
  async function doUndo() {
    if (!undo) return;
    const u = undo; setUndo(null); clearTimeout(undoTimer.current);
    await addEntry(u.mealId, u.entry);
  }
  async function setWaterMl(v) {
    const nv = Math.max(0, v); setWater(nv); await saveJSON("water:" + key, nv);
  }
  async function copyYesterday() {
    const y = new Date(date.getTime() - 86400000);
    const yd = await loadJSON("day:" + dateKey(y), emptyDay());
    const merged = { meals: {} };
    MEALS.forEach((m) => {
      const cloned = (yd.meals[m.id] || []).map((e) => ({ ...e, id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) }));
      merged.meals[m.id] = [...(day.meals[m.id] || []), ...cloned];
    });
    setDay(merged); await saveJSON("day:" + key, merged);
  }
  async function saveProfile(p) { const mp = migrateProfile(p); setProfile(mp); await saveJSON("profile", mp); setShowSettings(false); }

  if (loading) return <div className="pulse display" style={{ textAlign: "center", paddingTop: 120, fontSize: 22, color: "var(--green)" }}>Teller lädt …</div>;
  if (!profile) return <Onboarding onDone={saveProfile} />;

  const targets = profile.targets;
  const eaten = dayKcal(day);
  const dayEmpty = eaten === 0 && MEALS.every((m) => (day.meals[m.id] || []).length === 0);
  const waterGoal = derivedWaterGoal(profile);

  return (
    <div style={{ minHeight: "100vh", paddingBottom: "76px" }}>
      {/* Kopf */}
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 0", boxSizing: "border-box" }}>
        {view === "home" ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, gap: 8 }}>
            <button aria-label="Vorheriger Tag" onClick={() => setDate(new Date(date.getTime() - 86400000))} style={navBtnStyle}><Icon d={ICONS.chevL} size={18} /></button>
            <div style={{ textAlign: "center", minWidth: 0 }}>
              <div className="display" style={{ fontSize: 19, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{labelForDate(date)}</div>
              {dateKey(date) !== dateKey(new Date()) && (
                <button onClick={() => setDate(new Date())} style={{ border: "none", background: "transparent", color: COLORS.green, fontSize: 12.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: 2 }}>zu heute springen</button>
              )}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button aria-label="Nächster Tag" onClick={() => setDate(new Date(date.getTime() + 86400000))} style={navBtnStyle}><Icon d={ICONS.chevR} size={18} /></button>
              <button aria-label="Einstellungen" onClick={() => setShowSettings(true)} style={navBtnStyle}><Icon d={ICONS.gear} size={19} /></button>
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
            <div className="display" style={{ fontSize: 24 }}>{view === "weight" ? "Gewicht" : "Auswertung"}</div>
            <button aria-label="Einstellungen" onClick={() => setShowSettings(true)} style={navBtnStyle}><Icon d={ICONS.gear} size={19} /></button>
          </div>
        )}
      </div>

      {/* Inhalt */}
      <div className="fade-in" key={view} style={{ maxWidth: 480, margin: "0 auto", padding: "0 16px", boxSizing: "border-box" }}>
        {view === "home" && (
          <>
            <Card pad={22}>
              <Ring eaten={eaten} target={targets.kcal} />
              <div style={{ display: "flex", justifyContent: "center", gap: 26, marginTop: 14, fontSize: 13.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>
                <span><strong style={{ color: COLORS.ink }}>{nf(eaten)}</strong> gegessen</span>
                <span>Ziel <strong style={{ color: COLORS.ink }}>{nf(targets.kcal)}</strong></span>
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 18 }}>
                <MacroBar label="Protein" val={daySum(day, "protein")} target={targets.protein} color="var(--green)" soft="var(--green-soft)" />
                <MacroBar label="Kohlenh." val={daySum(day, "carbs")} target={targets.carbs} color="var(--amber)" soft="var(--amber-soft)" />
                <MacroBar label="Fett" val={daySum(day, "fat")} target={targets.fat} color="var(--berry)" soft="var(--berry-soft)" />
              </div>
            </Card>

            {profile.weekBudget && <WeekBudgetCard consumed={weekConsumed} budget={targets.kcal * 7} />}
            <WaterCard ml={water} goal={waterGoal} onAdd={(v) => setWaterMl(water + v)} onReset={() => setWaterMl(0)} />

            {dayEmpty && dateKey(date) === dateKey(new Date()) && (
              <button onClick={copyYesterday} style={{ width: "100%", marginTop: 12, minHeight: 46, borderRadius: 12, border: "1.5px dashed var(--line)", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, fontFamily: "inherit", cursor: "pointer" }}>
                ⧉ Gestern übernehmen
              </button>
            )}

            <div style={{ display: "grid", gap: 12, marginTop: 12 }}>
              {MEALS.map((m) => {
                const entries = day.meals[m.id] || [];
                const mealKcal = entries.reduce((a, e) => a + (Number(e.kcal) || 0), 0);
                const budget = Math.round(targets.kcal * m.share);
                return (
                  <Card key={m.id} pad={16}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 15.5, fontWeight: 700 }}>{m.emoji} {m.label}</div>
                        <div style={{ fontSize: 12.5, color: mealKcal > budget ? "var(--berry)" : "var(--muted)", fontVariantNumeric: "tabular-nums", marginTop: 2 }}>
                          {nf(mealKcal)} / {nf(budget)} kcal empfohlen
                        </div>
                      </div>
                      <button aria-label={`${m.label}: Essen hinzufügen`} onClick={() => setSheet(m.id)}
                        style={{ width: 44, height: 44, borderRadius: 99, border: "none", background: COLORS.green, color: COLORS.onAccent, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <Icon d={ICONS.plus} size={22} sw={2.2} />
                      </button>
                    </div>
                    {entries.length > 0 && (
                      <div style={{ marginTop: 10, borderTop: "1px solid var(--line)", paddingTop: 10, display: "grid", gap: 10 }}>
                        {entries.map((e) => (
                          <div key={e.id} style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 13.5, fontWeight: 500, lineHeight: 1.3, overflowWrap: "anywhere" }}>{e.name}</div>
                              <div style={{ fontSize: 12, color: COLORS.muted, fontVariantNumeric: "tabular-nums", marginTop: 1 }}>{r(e.kcal)} kcal · {r(e.protein)}P {r(e.carbs)}K {r(e.fat)}F</div>
                            </div>
                            <button aria-label={`${e.name} entfernen`} onClick={() => removeEntry(m.id, e.id)}
                              style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", flexShrink: 0, display: "flex" }}>
                              <Icon d={ICONS.close} size={16} />
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                );
              })}
            </div>

            <p style={{ textAlign: "center", fontSize: 12, color: COLORS.muted, marginTop: 20, lineHeight: 1.5 }}>
              Foto- und Textwerte sind KI-Schätzungen — als Trend über Tage zuverlässig, im Einzelfall gerne nachjustieren.
            </p>
          </>
        )}

        {view === "weight" && <WeightTab profile={profile} />}
        {view === "month" && <MonthTab profile={profile} />}
      </div>

      {/* Rückgängig-Toast */}
      {undo && (
        <div className="toast-in" style={{ position: "fixed", left: "50%", transform: "translateX(-50%)", bottom: "calc(84px + env(safe-area-inset-bottom))", zIndex: 55, background: "var(--ink)", color: "var(--bg)", borderRadius: 99, padding: "10px 12px 10px 18px", display: "flex", alignItems: "center", gap: 12, boxShadow: "var(--shadow-lg)", maxWidth: "calc(100% - 32px)" }}>
          <span style={{ fontSize: 13.5, fontWeight: 600 }}>Eintrag gelöscht</span>
          <button onClick={doUndo} style={{ border: "none", background: "var(--green)", color: "var(--on-accent)", borderRadius: 99, padding: "7px 14px", fontSize: 13.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Rückgängig</button>
        </div>
      )}

      <BottomNav view={view} setView={setView} />

      {sheet && <AddSheet mealId={sheet} onAdd={addEntry} onClose={() => setSheet(null)} />}
      {showSettings && <Settings profile={profile} theme={theme} onToggleTheme={() => applyTheme(theme === "dark" ? "light" : "dark")} onSave={saveProfile} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TellerApp />);
</script>
</body>
</html>
