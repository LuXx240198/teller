/* ============================================================
   TELLER — Theme & Basis-Styles
   Farbwelt: kühles Salbeiweiß, Tannengrün, Honig, Beere.
   Zwei Themes über data-theme am <html>-Element.
   ============================================================ */

:root {
  --bg:        #EEF2EC;
  --bg-elev:   #E6ECE4;
  --card:      #FFFFFF;
  --ink:       #1C2B24;
  --muted:     #6B7A70;
  --line:      #DCE5DC;
  --green:     #1E5B41;
  --green-soft:#E3EEE7;
  --amber:     #D98E2B;
  --amber-soft:#F7EBD8;
  --amber-ink: #7A5416;
  --berry:     #A34D5E;
  --berry-soft:#F3E3E6;
  --on-accent: #FFFFFF;
  --card-border: transparent;
  --shadow:    0 1px 3px rgba(28,43,36,.06);
  --shadow-md: 0 4px 16px rgba(28,43,36,.08);
  --shadow-lg: 0 12px 32px rgba(28,43,36,.14);
  --nav-bg:    rgba(255,255,255,.86);
}

[data-theme="dark"] {
  --bg:        #10161300;
  --bg:        #101613;
  --bg-elev:   #161E1A;
  --card:      #19221D;
  --ink:       #E9EFE9;
  --muted:     #94A39A;
  --line:      #29352E;
  --green:     #5AAA80;
  --green-soft:#1F2C25;
  --amber:     #DDA04A;
  --amber-soft:#2E2717;
  --amber-ink: #E4AC58;
  --berry:     #CB7A89;
  --berry-soft:#32242A;
  --on-accent: #0D1310;
  --card-border: #26332C;
  --shadow:    none;
  --shadow-md: 0 4px 16px rgba(0,0,0,.30);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.45);
  --nav-bg:    rgba(22,30,26,.86);
}

* { -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

#root { overflow-x: hidden; }

body {
  font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
  color: var(--ink);
  transition: background .25s ease, color .25s ease;
}

.display { font-family: 'Fraunces', Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }

.pulse { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .45 } }

.fade-in { animation: fadeIn .28s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }

.sheet-in { animation: sheetIn .3s cubic-bezier(.22,.61,.36,1) both; }
.sheet-in { overflow-x: hidden; }
@keyframes sheetIn { from { transform: translateY(100%) } to { transform: none } }

.toast-in { animation: toastIn .3s cubic-bezier(.22,.61,.36,1) both; }
@keyframes toastIn { from { opacity:0; transform: translate(-50%, 20px) } to { opacity:1; transform: translate(-50%, 0) } }

button { font-family: inherit; }
button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2.5px solid var(--amber);
  outline-offset: 2px;
}
input:focus, select:focus, textarea:focus { border-color: var(--green); }

/* Datumsfeld an normale Felder angleichen — iOS/Safari rendert es sonst
   deutlich höher und breiter als ein Zahlenfeld. */
input[type="date"] {
  -webkit-appearance: none;
  appearance: none;
  min-width: 0;
}
input[type="date"]::-webkit-date-and-time-value { text-align: left; margin: 0; padding: 0; }
input[type="date"]::-webkit-datetime-edit { padding: 0; line-height: normal; }
input[type="date"]::-webkit-calendar-picker-indicator { margin: 0 0 0 4px; padding: 0; }

/* dezente Scrollbars in Listen */
.thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.thin-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

@media (prefers-reduced-motion: reduce) {
  *, .pulse, .fade-in, .sheet-in, .toast-in { animation: none !important; transition: none !important; }
}

<!-- Theme sofort setzen, damit kein Aufblitzen entsteht -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("teller:theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
      var m = document.getElementById("theme-color-meta");
      if (m) m.setAttribute("content", t === "dark" ? "#101613" : "#EEF2EC");
    } catch (e) {}
  })();
</script>
<!-- Service Worker: automatische Updates beim nächsten Öffnen -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      var hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.register("sw.js").catch(function () {});
      var refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        // Nur bei einem echten Update neu laden, nicht bei der Erstinstallation.
        if (refreshing || !hadController) return;
        refreshing = true;
        location.reload();
      });
    });
  }
</script>

  const metab = (Number(p.metab) || 0) / 100;
  const goal = GOALS.find((g) => g.id === p.goal) || GOALS[1];
  let kcal = bmr * pal * (1 + energy) * (1 + metab) + goal.delta;
  kcal = Math.max(1200, Math.round(kcal / 10) * 10);
  let pgkg = p.goal === "lose" ? 2.0 : 1.8;
  if (p.sportType === "strength") pgkg += 0.2;
  else if (p.sportType === "mixed") pgkg += 0.1;
  const protein = Math.round(w * pgkg);
  const fat = Math.round((kcal * 0.28) / 9);
  const carbs = Math.max(0, Math.round((kcal - protein * 4 - fat * 9) / 4));
  return { kcal, protein, carbs, fat };
}

function parseAIJson(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Kein JSON gefunden");
  const obj = JSON.parse(clean.slice(start, end + 1));
  if (obj.error) throw new Error(String(obj.error));
  return {
    nr: obj.nr ? String(obj.nr).trim() : "",
    name: String(obj.name || "Mahlzeit"),
    kcal: r(obj.kcal), protein: r(obj.protein), carbs: r(obj.carbs), fat: r(obj.fat),
    portion: obj.portion ? String(obj.portion) : "",
    note: obj.note ? String(obj.note) : "",
  };
}

/* ---- KI-Kochvorschläge: mehrere Gerichte passend zum Restbudget ---- */
function parseSuggestions(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{"), end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Kein JSON gefunden");
  const obj = JSON.parse(clean.slice(start, end + 1));
  if (obj.error) throw new Error(String(obj.error));
  const arr = Array.isArray(obj.suggestions) ? obj.suggestions : (Array.isArray(obj.gerichte) ? obj.gerichte : []);
  const out = arr.map((o) => ({
    name: String(o.name || "Gericht"),
    kcal: r(o.kcal), protein: r(o.protein), carbs: r(o.carbs), fat: r(o.fat),
    portion: o.portion ? String(o.portion) : "",
    note: o.note ? String(o.note) : "",
  })).filter((o) => o.name && (o.kcal || o.protein || o.carbs || o.fat));
  if (!out.length) throw new Error("Keine Vorschläge erhalten");
  return out;
}

function fileToCompressedBase64(file, maxDim = 1024) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        try {
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement("canvas");
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
          resolve({ base64: dataUrl.split(",")[1], preview: dataUrl });
        } catch (e) { reject(e); }
      };
      img.onerror = () => reject(new Error("Bild konnte nicht gelesen werden"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Datei konnte nicht gelesen werden"));
    reader.readAsDataURL(file);
  });
}

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

function importData(file, onDone) {
  const rd = new FileReader();
  rd.onload = () => {
    try {
      const obj = JSON.parse(rd.result);
      const d = obj.data || obj;
      let n = 0;
      Object.keys(d).forEach((k) => { if (k.startsWith("teller:")) { localStorage.setItem(k, d[k]); n++; } });
      onDone(true, n);
    } catch (e) { onDone(false, 0, e.message); }
  };
  rd.readAsText(file);
}

function ResultEditor({ draft, setDraft, mealId, onConfirm, onBack }) {
  const set = (k) => (e) => setDraft({ ...draft, [k]: e.target.value });
  const meal = MEALS.find((m) => m.id === mealId);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      {draft.note && (
        <div style={{ background: COLORS.amberSoft, borderRadius: 12, padding: "10px 14px", fontSize: 13, color: COLORS.amberInk, lineHeight: 1.45 }}>
          {draft.portion ? `≈ ${draft.portion} · ` : ""}{draft.note}
        </div>
      )}
      <Field label="Bezeichnung"><input style={inputStyle} value={draft.name} onChange={set("name")} /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="Kalorien" suffix="kcal"><input type="number" inputMode="numeric" style={inputStyle} value={draft.kcal} onChange={set("kcal")} /></Field>
        <Field label="Protein" suffix="g"><input type="number" inputMode="numeric" style={inputStyle} value={draft.protein} onChange={set("protein")} /></Field>
        <Field label="Kohlenhydrate" suffix="g"><input type="number" inputMode="numeric" style={inputStyle} value={draft.carbs} onChange={set("carbs")} /></Field>
        <Field label="Fett" suffix="g"><input type="number" inputMode="numeric" style={inputStyle} value={draft.fat} onChange={set("fat")} /></Field>
      </div>
      <Toggle on={!!draft._save} onClick={() => setDraft({ ...draft, _save: !draft._save })} label="⭐ Als eigenes Gericht merken" />
      <button onClick={onConfirm} style={{ minHeight: 52, border: "none", borderRadius: 14, background: COLORS.green, color: COLORS.onAccent, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
        Zu {meal?.label} hinzufügen
      </button>
      <button onClick={onBack} style={{ minHeight: 44, border: "none", borderRadius: 12, background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, fontFamily: "inherit", cursor: "pointer" }}>
        Zurück
      </button>
    </div>
  );
}

/* ---------------- Add-Sheet ---------------- */

function ListRow({ children, onPick, onDelete, delLabel }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, background: COLORS.card, borderRadius: 12, padding: "10px 12px", border: "1px solid var(--line)" }}>
      <button onClick={onPick} style={{ flex: 1, minWidth: 0, border: "none", background: "transparent", textAlign: "left", cursor: "pointer", fontFamily: "inherit", color: COLORS.ink, padding: 0 }}>
        {children}
      </button>
      {onDelete && (
        <button aria-label={delLabel} onClick={onDelete} style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", flexShrink: 0, display: "flex" }}>
          <Icon d={ICONS.close} size={15} />
        </button>
      )}
    </div>
  );
}

function AddSheet({ mealId, onAdd, onClose, features }) {
  const feat = features || { ai: true, gourmet: true, juit: true };
  const availTabs = [
    ...(feat.ai ? [{ id: "photo", label: "Foto" }, { id: "text", label: "Text" }] : []),
    ...(feat.gourmet ? [{ id: "gourmet", label: "Gourmet" }] : []),
    ...(feat.juit ? [{ id: "juit", label: "Juit" }] : []),
    { id: "manual", label: "Meine" },
  ];
  const [tab, setTab] = useState(availTabs[0].id);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [draft, setDraft] = useState(null);
  const [desc, setDesc] = useState("");
  const [hint, setHint] = useState("");
  const [preview, setPreview] = useState(null);
  const fileRef = useRef(null);
  const gFileRef = useRef(null);
  const [gNr, setGNr] = useState("");
  const [jq, setJq] = useState("");
  const [gdb, setGdb] = useState({});
  const [odb, setOdb] = useState({});
  const meal = MEALS.find((m) => m.id === mealId);

  useEffect(() => { (async () => { setGdb(await loadJSON("gourmet-menues", {})); setOdb(await loadJSON("meine-gerichte", {})); })(); }, []);

  async function analyzePhoto(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Du bist Ernährungsexperte. Analysiere das Foto dieser Mahlzeit und schätze Portionsgröße und Nährwerte so genau wie möglich.${hint ? ` Zusatzinfo des Nutzers: ${hint}.` : ""} ${JSON_RULES}` },
      ]);
      setDraft(result);
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function analyzeText() {
    if (!desc.trim()) return;
    setBusy(true); setErr("");
    try {
      const result = await callClaude([{ type: "text", text: `Du bist Ernährungsexperte. Der Nutzer beschreibt, was er gegessen hat: "${desc}". Schätze die Nährwerte realistisch. ${JSON_RULES}` }]);
      setDraft(result);
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function lookupGourmet() {
    const q = gNr.trim(); if (!q) return;
    const qn = normNr(q);
    const own = await loadJSON("gourmet-menues", {});
    const ownKey = qn.length >= 3 ? Object.keys(own).find((k) => k === qn || k.endsWith(qn)) : null;
    if (ownKey) { setDraft({ ...own[ownKey], portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(ownKey)} — aus deiner gespeicherten Liste.`, _gnr: ownKey }); return; }
    if (qn.length >= 3) {
      const hits = GOURMET_DB_KEYS.filter((nr) => nr === qn || nr.endsWith(qn));
      if (hits.length === 1) { setDraft(gourmetDraft(hits[0], GOURMET_DB[hits[0]], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (hits.length > 1) { setErr(`„${q}" passt auf mehrere Artikel — bitte vollständige Nummer eingeben oder unten antippen.`); return; }
    } else if (q.length >= 3) {
      const nHits = Object.entries(GOURMET_DB).filter(([, d]) => d[0].toLowerCase().includes(q.toLowerCase()));
      if (nHits.length === 1) { setDraft(gourmetDraft(nHits[0][0], nHits[0][1], "aus der Sortimentsliste (HW 2021/22).")); return; }
      if (nHits.length > 1) { setErr(`Mehrere Treffer für „${q}" — tipp unten das richtige Gericht an.`); return; }
    }
    setBusy(true); setErr("");
    try {
      const result = await callClaude([{ type: "text", text: `Finde per Websuche die Nährwerte des GOURMET-Fertigmenüs „${q}" (GMS GOURMET GmbH, österreichische Betriebsverpflegung; Webshops: bestellung.gourmet.at, lieblingsspeisen.gourmet.at, gourmet-business.at). „${q}" ist Artikelnummer oder Bezeichnung. Gib die Werte für EINE ganze Portion an, nicht pro 100 g. WICHTIG: Wenn du das Menü nicht eindeutig findest, antworte exakt mit {"error":"Menü nicht gefunden"}. ${JSON_RULES}` }], true);
      setDraft({ ...result, _gnr: qn || normNr(result.nr) });
    } catch (e) { setErr(`„${q}" ist weder eingebaut noch online eindeutig zu finden. Tipp: Packung scannen oder manuell eintragen — die App merkt sich den Eintrag dann.`); }
    finally { setBusy(false); }
  }
  async function analyzePackage(file) {
    setBusy(true); setErr("");
    try {
      const { base64, preview } = await fileToCompressedBase64(file);
      setPreview(preview);
      const result = await callClaude([
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
        { type: "text", text: `Auf dem Foto ist die Verpackung eines GOURMET-Fertigmenüs. Lies Produktname und Nährwerttabelle ab. Sind die Werte pro 100 g, rechne sie anhand des Füllgewichts auf die GESAMTE Portion hoch. Falls eine Artikelnummer lesbar ist, gib sie als "nr" (String) aus, sonst "nr":"". ${JSON_RULES}` },
      ]);
      setDraft({ ...result, _gnr: gNr.trim() || result.nr || "" });
    } catch (e) { setErr("Analyse fehlgeschlagen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }
  async function removeGourmet(nr) { const db = await loadJSON("gourmet-menues", {}); delete db[nr]; await saveJSON("gourmet-menues", db); setGdb(db); }
  async function removeOwn(id) { const own = await loadJSON("meine-gerichte", {}); delete own[id]; await saveJSON("meine-gerichte", own); setOdb(own); }

  const gq = gNr.trim(); const gqn = normNr(gq);
  const gHits = gq.length >= 2 ? Object.entries(GOURMET_DB).filter(([nr, d]) =>
    (gqn.length >= 3 && (nr === gqn || nr.endsWith(gqn))) || (gq.length >= 3 && d[0].toLowerCase().includes(gq.toLowerCase()))).slice(0, 8) : [];
  const jqt = jq.trim().toLowerCase();
  const juitHits = jqt.length === 0 ? JUIT_DB : JUIT_DB.filter((d) => d[0].toLowerCase().includes(jqt) || d[1].toLowerCase().includes(jqt));

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(10,20,15,.5)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div className="sheet-in thin-scroll" onClick={(e) => e.stopPropagation()}
        style={{ background: COLORS.bg, width: "100%", maxWidth: 520, maxHeight: "92vh", overflowY: "auto", borderRadius: "24px 24px 0 0", padding: "16px 18px calc(28px + env(safe-area-inset-bottom))", boxSizing: "border-box" }}>
        <div style={{ width: 42, height: 4, borderRadius: 99, background: COLORS.line, margin: "0 auto 14px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <div className="display" style={{ fontSize: 23, color: COLORS.ink }}>{meal?.emoji} {meal?.label}</div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Schließen</button>
        </div>

        {draft ? (
          <ResultEditor draft={draft} setDraft={setDraft} mealId={mealId}
            onConfirm={async () => {
              const entry = { name: draft.name, kcal: r(draft.kcal), protein: r(draft.protein), carbs: r(draft.carbs), fat: r(draft.fat), id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) };
              const nr = normNr(draft._gnr);
              if (nr) { const db = await loadJSON("gourmet-menues", {}); db[nr] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat }; await saveJSON("gourmet-menues", db); }
              if (draft._save) { const own = await loadJSON("meine-gerichte", {}); const oid = draft._ownId || "g" + Date.now().toString(36); own[oid] = { name: entry.name, kcal: entry.kcal, protein: entry.protein, carbs: entry.carbs, fat: entry.fat, used: Date.now() }; await saveJSON("meine-gerichte", own); }
              else if (draft._ownId) { const own = await loadJSON("meine-gerichte", {}); if (own[draft._ownId]) { own[draft._ownId].used = Date.now(); await saveJSON("meine-gerichte", own); } }
              onAdd(mealId, entry); onClose();
            }}
            onBack={() => { setDraft(null); setPreview(null); }} />
        ) : (
          <>
            <Seg small options={availTabs} value={tab} onChange={(t) => { setTab(t); setErr(""); }} />
            <div style={{ marginTop: 16, display: "grid", gridTemplateColumns: "minmax(0, 1fr)", gap: 14 }}>
              {err && <div style={{ background: COLORS.berrySoft, color: COLORS.berry, borderRadius: 12, padding: "10px 14px", fontSize: 13, lineHeight: 1.45 }}>{err}</div>}
              {busy ? (
                <div style={{ textAlign: "center", padding: "34px 0" }}>
                  {preview && <img src={preview} alt="" style={{ width: 110, height: 110, objectFit: "cover", borderRadius: 16, marginBottom: 14 }} />}
                  <div className="pulse display" style={{ fontSize: 19, color: COLORS.green }}>Claude analysiert dein Essen …</div>
                  <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 6 }}>dauert ein paar Sekunden</div>
                </div>
              ) : (
                <>
                  {tab === "photo" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Optionaler Hinweis für die KI">
                        <input style={inputStyle} value={hint} onChange={(e) => setHint(e.target.value)} placeholder="z. B. große Portion, mit Öl gebraten" />
                      </Field>
                      <button onClick={() => fileRef.current?.click()}
                        style={{ minHeight: 120, border: "2px dashed var(--green)", borderRadius: 16, background: COLORS.greenSoft, color: COLORS.green, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                        📷 Foto aufnehmen oder auswählen
                      </button>
                      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePhoto(f); e.target.value = ""; }} />
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>Fotowerte sind KI-Schätzungen (±20–30 %). Danach anpassbar.</p>
                    </>
                  )}
                  {tab === "text" && (
                    <>
                      {!getApiKey() && <KeyHint />}
                      <Field label="Was hast du gegessen?">
                        <textarea rows={3} style={{ ...inputStyle, resize: "vertical" }} value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="z. B. 200 g Hähnchenbrust mit 150 g Reis und Brokkoli" />
                      </Field>
                      <button onClick={analyzeText} disabled={!desc.trim()}
                        style={{ minHeight: 52, border: "none", borderRadius: 14, background: desc.trim() ? COLORS.green : COLORS.line, color: desc.trim() ? COLORS.onAccent : COLORS.muted, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: desc.trim() ? "pointer" : "default" }}>
                        Nährwerte schätzen
                      </button>
                    </>
                  )}
                  {tab === "gourmet" && (
                    <>
                      <Field label="Artikelnummer oder Gerichtsname">
                        <input style={inputStyle} value={gNr} onChange={(e) => setGNr(e.target.value)} placeholder="z. B. 230 1148 oder Gulasch" />
                      </Field>
                      {gHits.length > 0 && (
                        <div style={{ display: "grid", gap: 6 }}>
                          {gHits.map(([nr, d]) => (
                            <ListRow key={nr} onPick={() => setDraft(gourmetDraft(nr, d, "aus der Sortimentsliste (HW 2021/22)."))}>
                              <span style={{ display: "flex", justifyContent: "space-between", gap: 8, fontSize: 13 }}>
                                <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}><strong>{fmtNr(nr)}</strong> · {d[0]}</span>
                                <span style={{ color: COLORS.muted, flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>{d[1]} kcal</span>
                              </span>
                            </ListRow>
                          ))}
                        </div>
                      )}
                      <div style={{ display: "grid", gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr)", gap: 10 }}>
                        <button onClick={lookupGourmet} disabled={!gNr.trim()}
                          style={{ minHeight: 50, border: "none", borderRadius: 14, background: gNr.trim() ? COLORS.green : COLORS.line, color: gNr.trim() ? COLORS.onAccent : COLORS.muted, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: gNr.trim() ? "pointer" : "default" }}>Werte holen</button>
                        <button onClick={() => gFileRef.current?.click()}
                          style={{ minHeight: 50, border: "1.5px solid var(--green)", borderRadius: 14, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>📷 Scannen</button>
                      </div>
                      <input ref={gFileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePackage(f); e.target.value = ""; }} />
                      {Object.keys(gdb).length > 0 && (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Gespeicherte Menüs</div>
                          <div style={{ display: "grid", gap: 6 }}>
                            {Object.entries(gdb).sort((a, b) => a[0].localeCompare(b[0], "de", { numeric: true })).map(([nr, m]) => (
                              <ListRow key={nr} delLabel={`Nr. ${nr} löschen`} onDelete={() => removeGourmet(nr)}
                                onPick={() => setDraft({ ...m, portion: "1 Portion", note: `GOURMET Nr. ${fmtNr(nr)} — aus deiner gespeicherten Liste.`, _gnr: nr })}>
                                <span style={{ fontSize: 13.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}>
                                  <strong>Nr. {fmtNr(nr)}</strong> · {m.name} <span style={{ color: COLORS.muted }}>· {m.kcal} kcal</span>
                                </span>
                              </ListRow>
                            ))}
                          </div>
                        </div>
                      )}
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Über 260 Gerichte der Sortimentsliste (À la Carte HW 2021/22) sind eingebaut. Nicht dabei? Dann sucht Claude online oder du scannst die Packung.
                      </p>
                    </>
                  )}
                  {tab === "juit" && (
                    <>
                      <Field label="Gericht suchen">
                        <input style={inputStyle} value={jq} onChange={(e) => setJq(e.target.value)} placeholder="z. B. Butter Chicken oder Curry" />
                      </Field>
                      <div className="thin-scroll" style={{ display: "grid", gap: 6, maxHeight: 320, overflowY: "auto", margin: "-2px -2px 0", padding: 2 }}>
                        {juitHits.length > 0 ? juitHits.map((d, i) => (
                          <ListRow key={i} onPick={() => setDraft(juitDraft(d))}>
                            <span style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                              <span style={{ minWidth: 0, flex: 1 }}>
                                <span style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 13.5, fontWeight: 600 }}>{d[0]}</span>
                                <span style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12, color: COLORS.muted }}>{d[1]}</span>
                              </span>
                              <span style={{ textAlign: "right", flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>
                                <span style={{ display: "block", fontSize: 13.5, fontWeight: 700 }}>{d[2]} kcal</span>
                                <span style={{ display: "block", fontSize: 11.5, color: COLORS.muted }}>{d[3]}P {d[4]}K {d[5]}F</span>
                              </span>
                            </span>
                          </ListRow>
                        )) : <p style={{ fontSize: 13, color: COLORS.muted, textAlign: "center", padding: "10px 0", margin: 0 }}>Kein Juit-Gericht gefunden.</p>}
                      </div>
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Alle {JUIT_DB.length} Juit-Gerichte mit offiziellen Nährwerten sind eingebaut. Werte nach Auswahl anpassbar.
                      </p>
                    </>
                  )}
                  {tab === "manual" && (
                    <>
                      <button onClick={() => setDraft({ name: "", kcal: "", protein: "", carbs: "", fat: "", note: "", portion: "", _save: true })}
                        style={{ minHeight: 54, border: "2px dashed var(--green)", borderRadius: 14, background: COLORS.greenSoft, color: COLORS.green, fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                        + Neues Gericht anlegen
                      </button>
                      {Object.keys(odb).length > 0 ? (
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Meine Gerichte</div>
                          <div style={{ display: "grid", gap: 6 }}>
                            {Object.entries(odb).sort((a, b) => (b[1].used || 0) - (a[1].used || 0)).map(([id, m]) => (
                              <ListRow key={id} delLabel={`${m.name} löschen`} onDelete={() => removeOwn(id)}
                                onPick={() => setDraft({ name: m.name, kcal: m.kcal, protein: m.protein, carbs: m.carbs, fat: m.fat, note: "Aus deinen gespeicherten Gerichten.", portion: "", _ownId: id })}>
                                <span style={{ fontSize: 13.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block" }}>
                                  <strong>{m.name}</strong> <span style={{ color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>· {m.kcal} kcal · {r(m.protein)}P {r(m.carbs)}K {r(m.fat)}F</span>
                                </span>
                              </ListRow>
                            ))}
                          </div>
                        </div>
                      ) : <p style={{ fontSize: 13, color: COLORS.muted, lineHeight: 1.5, margin: 0, textAlign: "center", padding: "10px 0" }}>Noch keine eigenen Gerichte gespeichert.</p>}
                      <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: 0 }}>
                        Zuletzt gegessene Gerichte stehen oben — praktisch für Meal Prep. Auch Foto, Text, Gourmet und Juit lassen sich mit „merken" hier ablegen.
                      </p>
                    </>
                  )}
                </>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ---------------- Wasser-Tracker ---------------- */

function WaterCard({ ml, goal, onAdd, onReset }) {
  const pct = goal > 0 ? Math.min(1, ml / goal) : 0;
  return (
    <Card style={{ marginTop: 12 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: COLORS.green, display: "flex" }}><Icon d={ICONS.drop} size={20} /></span>
          <span style={{ fontSize: 15.5, fontWeight: 700 }}>Wasser</span>
        </div>
        <span style={{ fontSize: 13.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>
          <strong style={{ color: COLORS.ink }}>{nf(ml)}</strong> / {nf(goal)} ml
        </span>
      </div>
      <div style={{ height: 10, borderRadius: 99, background: COLORS.greenSoft, overflow: "hidden", marginBottom: 12 }}>
        <div style={{ height: "100%", width: `${pct * 100}%`, background: COLORS.green, borderRadius: 99, transition: "width .4s ease" }} />
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        {[250, 500].map((v) => (
          <button key={v} onClick={() => onAdd(v)} style={{ flex: 1, minHeight: 44, borderRadius: 12, border: "1.5px solid var(--green)", background: COLORS.greenSoft, color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>+{v} ml</button>
        ))}
        <button onClick={() => onAdd(-250)} aria-label="250 ml abziehen" style={{ width: 48, minHeight: 44, borderRadius: 12, border: "1.5px solid var(--line)", background: COLORS.card, color: COLORS.muted, fontSize: 18, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>−</button>
        <button onClick={onReset} aria-label="Zurücksetzen" style={{ width: 48, minHeight: 44, borderRadius: 12, border: "1.5px solid var(--line)", background: COLORS.card, color: COLORS.muted, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5" size={17} />
        </button>
      </div>
    </Card>
  );
}

/* ---------------- Wochenbudget ---------------- */

function WeekBudgetCard({ consumed, budget }) {
  const remaining = budget - consumed;
  const pct = budget > 0 ? Math.min(1, consumed / budget) : 0;
  const over = consumed > budget;
  return (
    <Card style={{ marginTop: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <span style={{ fontSize: 15.5, fontWeight: 700 }}>Wochenbudget</span>
        <span style={{ fontSize: 12.5, color: COLORS.muted }}>Mo bis So</span>
      </div>
      <div style={{ height: 10, borderRadius: 99, background: COLORS.greenSoft, overflow: "hidden", marginBottom: 12 }}>
        <div style={{ height: "100%", width: `${pct * 100}%`, background: over ? COLORS.berry : COLORS.green, borderRadius: 99, transition: "width .4s ease" }} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", textAlign: "center", gap: 8 }}>
        <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18 }}>{nf(budget)}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>Budget</div></div>
        <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18 }}>{nf(consumed)}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>verbraucht</div></div>
        <div style={{ flex: 1 }}><div className="display" style={{ fontSize: 18, color: over ? "var(--berry)" : "var(--green)" }}>{nf(Math.abs(remaining))}</div><div style={{ fontSize: 11.5, color: COLORS.muted }}>{over ? "darüber" : "übrig"}</div></div>
      </div>
    </Card>
  );
}

/* ---------------- Gewicht ---------------- */

function WeightChart({ entries, target }) {
  const W = 320, H = 172, padL = 30, padR = 12, padT = 14, padB = 22;
  const pts = entries.map((e) => ({ t: new Date(e.d).getTime(), kg: Number(e.kg) }));
  const single = pts.length === 1;
  const minT = pts[0].t, maxT = pts[pts.length - 1].t;
  const spanT = Math.max(1, maxT - minT);
  const kgs = pts.map((p) => p.kg).concat(target ? [Number(target)] : []);
  let minK = Math.min(...kgs), maxK = Math.max(...kgs);
  if (maxK - minK < 2) { minK -= 1; maxK += 1; }
  const spanK = maxK - minK;
  const plotBottom = H - padB;
  const x = (t) => single ? padL + (W - padL - padR) / 2 : padL + ((t - minT) / spanT) * (W - padL - padR);
  const y = (kg) => padT + (1 - (kg - minK) / spanK) * (H - padT - padB);
  const line = pts.map((p, i) => `${i ? "L" : "M"}${x(p.t).toFixed(1)},${y(p.kg).toFixed(1)}`).join(" ");
  const area = !single ? `${line} L${x(maxT).toFixed(1)},${plotBottom.toFixed(1)} L${x(minT).toFixed(1)},${plotBottom.toFixed(1)} Z` : "";
  const ty = target ? y(Number(target)) : null;
  const fmtD = (t) => new Date(t).toLocaleDateString("de-AT", { day: "numeric", month: "short" });
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ display: "block", width: "100%", height: "auto" }}>
      <defs>
        <linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="var(--green)" stopOpacity="0.20" />
          <stop offset="100%" stopColor="var(--green)" stopOpacity="0" />
        </linearGradient>
      </defs>
      <line x1={padL} y1={padT} x2={W - padR} y2={padT} stroke="var(--line)" strokeWidth="1" />
      <line x1={padL} y1={plotBottom} x2={W - padR} y2={plotBottom} stroke="var(--line)" strokeWidth="1" />
      <text x={padL - 5} y={padT + 3} textAnchor="end" fontSize="9" fill="var(--muted)">{nf(Math.round(maxK * 10) / 10)}</text>
      <text x={padL - 5} y={plotBottom + 3} textAnchor="end" fontSize="9" fill="var(--muted)">{nf(Math.round(minK * 10) / 10)}</text>
      {ty != null && ty > padT && ty < plotBottom && (
        <g>
          <line x1={padL} y1={ty} x2={W - padR} y2={ty} stroke="var(--amber)" strokeWidth="1.4" strokeDasharray="5 4" />
          <text x={W - padR} y={ty - 4} textAnchor="end" fontSize="10" fill="var(--amber)">Ziel {nf(target)} kg</text>
        </g>
      )}
      {area && <path d={area} fill="url(#wfill)" stroke="none" />}
      {!single && <path d={line} fill="none" stroke="var(--green)" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />}
      {pts.map((p, i) => <circle key={i} cx={x(p.t)} cy={y(p.kg)} r={i === pts.length - 1 ? 4 : 2.6} fill="var(--green)" />)}
      {single && <text x={x(pts[0].t)} y={y(pts[0].kg) - 10} textAnchor="middle" fontSize="11" fontWeight="700" fill="var(--green)">{nf(pts[0].kg)} kg</text>}
      <text x={padL} y={H - 6} textAnchor="start" fontSize="9" fill="var(--muted)">{fmtD(minT)}</text>
      {!single && <text x={W - padR} y={H - 6} textAnchor="end" fontSize="9" fill="var(--muted)">{fmtD(maxT)}</text>}
    </svg>
  );
}

const BMI_CATS = [
  { max: 18.5, label: "Untergewicht", color: "var(--amber)" },
  { max: 25, label: "Normalgewicht", color: "var(--green)" },
  { max: 30, label: "Übergewicht", color: "var(--amber)" },
  { max: Infinity, label: "Adipositas", color: "var(--berry)" },
];

function StatTile({ label, value, sub, color }) {
  return (
    <div style={{ background: "var(--bg-elev)", borderRadius: 14, padding: "12px 12px", textAlign: "center", minWidth: 0 }}>
      <div className="display" style={{ fontSize: 20, color: color || "var(--ink)", fontVariantNumeric: "tabular-nums", lineHeight: 1.1 }}>{value}</div>
      <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>{label}</div>
      {sub && <div style={{ fontSize: 10.5, color: "var(--muted)", marginTop: 1 }}>{sub}</div>}
    </div>
  );
}

function WeightTab({ profile, onUpdateProfile }) {
  const [entries, setEntries] = useState([]);
  const [kg, setKg] = useState("");
  const [d, setD] = useState(dateKey(new Date()));
  const [range, setRange] = useState("all");
  const [tw, setTw] = useState(profile.targetWeight != null ? String(profile.targetWeight) : "");
  useEffect(() => { (async () => setEntries(await loadJSON("weights", [])))(); }, []);
  useEffect(() => { setTw(profile.targetWeight != null ? String(profile.targetWeight) : ""); }, [profile.targetWeight]);

  async function add() {
    const v = parseFloat(String(kg).replace(",", "."));
    if (!v || !d) return;
    const next = [...entries.filter((e) => e.d !== d), { d, kg: v }].sort((a, b) => a.d.localeCompare(b.d));
    setEntries(next); await saveJSON("weights", next); setKg("");
  }
  async function del(dk) { const next = entries.filter((e) => e.d !== dk); setEntries(next); await saveJSON("weights", next); }
  function saveTarget() {
    const v = tw.trim() === "" ? "" : parseFloat(String(tw).replace(",", "."));
    if (v !== "" && !(v > 0)) return;
    if (onUpdateProfile) onUpdateProfile({ targetWeight: v === "" ? "" : v });
  }

  const sorted = entries;
  const start = sorted[0], current = sorted[sorted.length - 1];
  const change = start && current ? current.kg - start.kg : 0;
  const target = profile.targetWeight ? Number(profile.targetWeight) : null;

  // 7-Tage-Änderung: Eintrag am/vor 7 Tagen vor dem aktuellen finden
  let change7 = null;
  if (current && sorted.length >= 2) {
    const curT = new Date(current.d).getTime();
    let ref = sorted[0];
    for (const e of sorted) { const t = new Date(e.d).getTime(); if (t <= curT - 7 * 86400000) ref = e; }
    change7 = current.kg - ref.kg;
  }

  // BMI aus aktuellem Gewicht (oder Profil) + Größe
  const h = Number(profile.height) || 0;
  const bmiKg = current ? current.kg : Number(profile.weight) || 0;
  let bmi = null, bmiCat = null;
  if (h > 0 && bmiKg > 0) { bmi = bmiKg / Math.pow(h / 100, 2); bmiCat = BMI_CATS.find((c) => bmi < c.max); }

  // lineare Regression für Wochentrend
  let slope = null, prognosis = null;
  if (sorted.length >= 2) {
    const t0 = new Date(sorted[0].d).getTime();
    const xs = sorted.map((e) => (new Date(e.d).getTime() - t0) / 86400000);
    const ys = sorted.map((e) => e.kg);
    const n = xs.length, sx = xs.reduce((a, b) => a + b, 0), sy = ys.reduce((a, b) => a + b, 0);
    const sxx = xs.reduce((a, b) => a + b * b, 0), sxy = xs.reduce((a, b, i) => a + b * ys[i], 0);
    const denom = n * sxx - sx * sx;
    slope = denom !== 0 ? (n * sxy - sx * sy) / denom : 0; // kg pro Tag
    const perWeek = slope * 7;
    if (target != null && current) {
      const need = target - current.kg;
      const ok = (need < 0 && slope < -0.0005) || (need > 0 && slope > 0.0005);
      const reached = Math.abs(need) < 0.3;
      if (reached) prognosis = { perWeek, text: "Zielgewicht praktisch erreicht 🎉", reached: true };
      else if (ok) {
        const weeks = need / perWeek;
        const date = new Date(Date.now() + weeks * 7 * 86400000);
        prognosis = { perWeek, weeks: Math.ceil(weeks), date, text: null };
      } else prognosis = { perWeek, text: "Aktueller Trend führt nicht Richtung Ziel.", off: true };
    } else prognosis = { perWeek, text: target == null ? "Trag ein Zielgewicht ein für eine Prognose." : null };
  }
  const perWeek = slope != null ? slope * 7 : null;

  // Zeitraum-Filter nur für den Graphen
  const now = Date.now();
  const rangeDays = range === "7" ? 7 : range === "30" ? 30 : null;
  let chartEntries = sorted;
  if (rangeDays) {
    const cut = now - rangeDays * 86400000;
    const f = sorted.filter((e) => new Date(e.d).getTime() >= cut);
    chartEntries = f.length >= 1 ? f : sorted.slice(-1);
  }

  // Fortschritt Richtung Ziel
  let progress = null, remainKg = null, reachedTarget = false;
  if (target != null && start && current) {
    remainKg = current.kg - target;
    reachedTarget = Math.abs(remainKg) < 0.3;
    const denomP = target - start.kg;
    progress = denomP === 0 ? 1 : Math.min(1, Math.max(0, (current.kg - start.kg) / denomP));
  }

  const changeColor = (v) => (v <= 0 ? "var(--green)" : "var(--berry)");
  const fmtDelta = (v) => (v > 0 ? "+" : "") + v.toFixed(1).replace(".", ",");

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 12 }}>Gewicht eintragen</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Datum"><input type="date" style={inputStyle} value={d} max={dateKey(new Date())} onChange={(e) => setD(e.target.value)} /></Field>
          <Field label="Gewicht" suffix="kg"><input type="number" inputMode="decimal" style={inputStyle} value={kg} onChange={(e) => setKg(e.target.value)} placeholder="77,5" /></Field>
          <button onClick={add} disabled={!kg} style={{ minHeight: 48, padding: "0 18px", border: "none", borderRadius: 12, background: kg ? COLORS.green : COLORS.line, color: kg ? COLORS.onAccent : COLORS.muted, fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: kg ? "pointer" : "default" }}>Speichern</button>
        </div>
      </Card>

      {sorted.length >= 1 && (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <div style={{ fontSize: 13, color: COLORS.muted }}>Aktuelles Gewicht</div>
            <div className="display" style={{ fontSize: 30, color: COLORS.ink }}>{nf(current.kg)} <span style={{ fontSize: 16, color: COLORS.muted }}>kg</span></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <StatTile label="seit Start" value={sorted.length >= 2 ? fmtDelta(change) : "—"} color={sorted.length >= 2 ? changeColor(change) : COLORS.muted} sub="kg" />
            <StatTile label="7 Tage" value={change7 != null ? fmtDelta(change7) : "—"} color={change7 != null ? changeColor(change7) : COLORS.muted} sub="kg" />
            <StatTile label="Trend" value={perWeek != null ? fmtDelta(perWeek) : "—"} color={perWeek != null ? changeColor(perWeek) : COLORS.muted} sub="kg/Woche" />
          </div>
          {bmi != null && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
              <div style={{ fontSize: 13, color: COLORS.muted }}>BMI</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span className="display" style={{ fontSize: 18, color: COLORS.ink, fontVariantNumeric: "tabular-nums" }}>{bmi.toFixed(1).replace(".", ",")}</span>
                <span style={{ fontSize: 12.5, fontWeight: 600, color: bmiCat.color }}>{bmiCat.label}</span>
              </div>
            </div>
          )}
        </Card>
      )}

      {sorted.length >= 1 ? (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8 }}>
            <div style={{ fontSize: 15.5, fontWeight: 700 }}>Verlauf</div>
            <div style={{ width: 168 }}>
              <Seg small options={[{ id: "7", label: "7 T" }, { id: "30", label: "30 T" }, { id: "all", label: "Alles" }]} value={range} onChange={setRange} />
            </div>
          </div>
          <WeightChart entries={chartEntries} target={target} />
          {sorted.length === 1 && <p style={{ margin: "10px 0 0", fontSize: 12.5, color: COLORS.muted, textAlign: "center", lineHeight: 1.5 }}>Ab dem zweiten Eintrag zeichne ich hier die Verlaufslinie.</p>}
        </Card>
      ) : (
        <Card><p style={{ margin: 0, fontSize: 13.5, color: COLORS.muted, lineHeight: 1.5, textAlign: "center" }}>Trag dein erstes Gewicht ein — danach zeige ich hier Verlauf, Trend und eine Prognose.</p></Card>
      )}

      <Card>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 10 }}>Ziel & Fortschritt</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 8, alignItems: "end" }}>
          <Field label="Zielgewicht" suffix="kg">
            <input type="number" inputMode="decimal" style={inputStyle} value={tw} onChange={(e) => setTw(e.target.value)}
              onBlur={saveTarget} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); e.target.blur(); } }} placeholder="z. B. 74" />
          </Field>
          <button onClick={saveTarget} style={{ minHeight: 48, padding: "0 16px", border: "1.5px solid var(--green)", borderRadius: 12, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Setzen</button>
        </div>
        {target != null && current ? (
          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: COLORS.muted, marginBottom: 6 }}>
              <span>Start {start ? nf(start.kg) : "—"} kg</span>
              <span>Ziel {nf(target)} kg</span>
            </div>
            <div style={{ height: 10, borderRadius: 99, background: "var(--bg-elev)", overflow: "hidden" }}>
              <div style={{ width: `${Math.round((progress || 0) * 100)}%`, height: "100%", borderRadius: 99, background: reachedTarget ? "var(--green)" : "var(--green)", transition: "width .5s ease" }} />
            </div>
            <div style={{ fontSize: 13.5, color: COLORS.ink, marginTop: 10, lineHeight: 1.5 }}>
              {reachedTarget
                ? <>Zielgewicht praktisch erreicht 🎉</>
                : <>Noch <strong>{Math.abs(remainKg).toFixed(1).replace(".", ",")} kg</strong> bis zu deinem Ziel · {Math.round((progress || 0) * 100)} % geschafft.</>}
            </div>
          </div>
        ) : (
          <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: "10px 0 0" }}>Setz ein Zielgewicht, dann zeige ich Fortschritt und eine Prognose.</p>
        )}
      </Card>

      {prognosis && (
        <Card style={{ background: "var(--green-soft)" }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>Prognose</div>
          <div style={{ fontSize: 13.5, color: COLORS.ink, lineHeight: 1.55 }}>
            Aktueller Trend: <strong>{prognosis.perWeek > 0 ? "+" : ""}{prognosis.perWeek.toFixed(2).replace(".", ",")} kg / Woche</strong>.
            {prognosis.text ? <> {prognosis.text}</> : <> Bei gleichbleibendem Tempo erreichst du dein Ziel von {nf(target)} kg in etwa <strong>{prognosis.weeks} Wochen</strong> (ca. {prognosis.date.toLocaleDateString("de-AT", { month: "long", year: "numeric" })}).</>}
          </div>
          {!prognosis.reached && <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 6 }}>Grobe Schätzung aus dem bisherigen Verlauf — schwankt bei wenigen Einträgen stark.</div>}
        </Card>
      )}

      {sorted.length > 0 && (
        <Card>
          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Einträge</div>
          <div style={{ display: "grid", gap: 6 }}>
            {[...sorted].reverse().map((e) => (
              <div key={e.d} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, padding: "4px 0" }}>
                <span style={{ flex: 1, color: COLORS.muted }}>{new Date(e.d).toLocaleDateString("de-AT", { weekday: "short", day: "numeric", month: "short", year: "numeric" })}</span>
                <span style={{ fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{nf(e.kg)} kg</span>
                <button aria-label="Eintrag löschen" onClick={() => del(e.d)} style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", display: "flex" }}><Icon d={ICONS.close} size={15} /></button>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

/* ---------------- Monatsauswertung ---------------- */

function MonthTab({ profile }) {
  const [ref, setRef] = useState(new Date());
  const [days, setDays] = useState([]);
  const year = ref.getFullYear(), month = ref.getMonth();

  useEffect(() => {
    (async () => {
      const ds = monthDates(year, month);
      const loaded = [];
      for (const d of ds) { const day = await loadJSON("day:" + dateKey(d), null); if (day) loaded.push(day); }
      setDays(loaded);
    })();
  }, [year, month]);

  const logged = days.filter((d) => dayKcal(d) > 0);
  const n = logged.length;
  const avg = (k) => (n ? Math.round(logged.reduce((a, d) => a + daySum(d, k), 0) / n) : 0);
  const t = profile.targets;
  const rows = [
    { key: "kcal", label: "Kalorien", unit: "kcal", avg: avg("kcal"), target: t.kcal },
    { key: "protein", label: "Protein", unit: "g", avg: avg("protein"), target: t.protein },
    { key: "carbs", label: "Kohlenhydrate", unit: "g", avg: avg("carbs"), target: t.carbs },
    { key: "fat", label: "Fett", unit: "g", avg: avg("fat"), target: t.fat },
  ].map((row) => {
    const diff = row.avg - row.target;
    const pct = row.target ? diff / row.target : 0;
    let flag = "ok";
    if (pct < -0.1) flag = "low";
    else if (pct > 0.1) flag = "high";
    return { ...row, diff, pct, flag };
  });

  const monthName = ref.toLocaleDateString("de-AT", { month: "long", year: "numeric" });
  const isCurrent = year === new Date().getFullYear() && month === new Date().getMonth();

  const suggest = (row) => {
    const less = Math.abs(row.diff);
    if (row.flag === "low") {
      if (row.key === "protein") return `Im Schnitt ${less} g Protein pro Tag zu wenig — mehr proteinreiche Lebensmittel (Huhn, Fisch, Quark, Hülsenfrüchte).`;
      if (row.key === "carbs") return `Im Schnitt ${less} g Kohlenhydrate pro Tag zu wenig — z. B. Vollkorn, Obst, Reis ergänzen.`;
      if (row.key === "fat") return `Im Schnitt ${less} g Fett pro Tag zu wenig — gesunde Fette wie Nüsse, Olivenöl, Avocado.`;
      return `Im Schnitt ${nf(less)} kcal pro Tag unter dem Ziel — insgesamt etwas mehr essen.`;
    }
    if (row.flag === "high") {
      if (row.key === "kcal") return `Im Schnitt ${nf(less)} kcal pro Tag über dem Ziel — Portionen oder Snacks etwas reduzieren.`;
      return `Im Schnitt ${less} ${row.unit} ${row.label} pro Tag über dem Ziel.`;
    }
    return null;
  };
  const deviations = rows.filter((r0) => r0.flag !== "ok").sort((a, b) => Math.abs(b.pct) - Math.abs(a.pct));

  const flagColor = (f) => f === "low" ? COLORS.berry : f === "high" ? COLORS.amber : COLORS.green;
  const flagText = (f) => f === "low" ? "zu wenig" : f === "high" ? "zu viel" : "im Ziel";

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <Card>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button aria-label="Vormonat" onClick={() => setRef(new Date(year, month - 1, 1))} style={navBtnStyle}><Icon d={ICONS.chevL} size={18} /></button>
          <div className="display" style={{ fontSize: 18 }}>{monthName}</div>
          <button aria-label="Folgemonat" disabled={isCurrent} onClick={() => setRef(new Date(year, month + 1, 1))} style={{ ...navBtnStyle, opacity: isCurrent ? .4 : 1 }}><Icon d={ICONS.chevR} size={18} /></button>
        </div>
      </Card>

      {n === 0 ? (
        <Card><p style={{ margin: 0, fontSize: 13.5, color: COLORS.muted, lineHeight: 1.5, textAlign: "center" }}>Für {monthName} sind noch keine Einträge vorhanden.</p></Card>
      ) : (
        <>
          <Card>
            <div style={{ fontSize: 13, color: COLORS.muted, marginBottom: 12 }}>Durchschnitt über <strong style={{ color: COLORS.ink }}>{n}</strong> erfasste Tage · Vergleich mit deinen Zielen</div>
            <div style={{ display: "grid", gap: 12 }}>
              {rows.map((row) => {
                const pct = row.target ? Math.min(1, row.avg / row.target) : 0;
                return (
                  <div key={row.key}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5, gap: 8 }}>
                      <span style={{ fontSize: 13.5, fontWeight: 600 }}>{row.label}</span>
                      <span style={{ fontSize: 12.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums", whiteSpace: "nowrap" }}>
                        Ø {nf(row.avg)} / {nf(row.target)} {row.unit}
                        <span style={{ color: flagColor(row.flag), fontWeight: 700, marginLeft: 8 }}>{flagText(row.flag)}</span>
                      </span>
                    </div>
                    <div style={{ height: 8, borderRadius: 99, background: COLORS.greenSoft, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct * 100}%`, background: flagColor(row.flag), borderRadius: 99 }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          <Card>
            <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 8 }}>Zusammenfassung</div>
            {deviations.length === 0 ? (
              <p style={{ margin: 0, fontSize: 13.5, color: COLORS.ink, lineHeight: 1.55 }}>Starker Monat — alle Werte liegen im Rahmen deiner Ziele. Weiter so.</p>
            ) : (
              <div style={{ display: "grid", gap: 8 }}>
                {deviations.slice(0, 3).map((row) => (
                  <div key={row.key} style={{ display: "flex", gap: 8, fontSize: 13.5, color: COLORS.ink, lineHeight: 1.5 }}>
                    <span style={{ color: flagColor(row.flag), flexShrink: 0, fontWeight: 700 }}>•</span>
                    <span>{suggest(row)}</span>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </>
      )}
    </div>
  );
}

  const recalced = calcTargets(p);

  useEffect(() => { (async () => setExclusions(await loadJSON("exclusions", [])))(); }, []);
  async function addExcl() {
    const parts = exclInput.split(/[,\n]/).map((s) => s.trim()).filter(Boolean);

    const merged = [...exclusions];
    parts.forEach((pp) => { if (!merged.some((x) => x.toLowerCase() === pp.toLowerCase())) merged.push(pp); });
    setExclusions(merged); setExclInput(""); await saveJSON("exclusions", merged);

  }

                <Field label="Wasserziel" suffix="ml, leer = aus Gewicht">

              </section>

              <section style={{ display: "grid", gap: 10 }}>
                <SectionTitle>KI-Analyse (optional)</SectionTitle>
                <Field label="Anthropic API-Key">
                  <input type="password" autoComplete="off" style={inputStyle} value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-..." />

                  Nur lokal auf diesem Gerät gespeichert und direkt an die Anthropic-API geschickt. Ohne Key funktionieren Listen, eigene Gerichte und manuelle Einträge trotzdem.

                </div>
                {exclusions.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 2 }}>
                    {exclusions.map((x, i) => (
                      <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: COLORS.card, border: "1px solid var(--line)", borderRadius: 99, padding: "6px 10px 6px 12px", fontSize: 13.5 }}>
                        {x}
                        <button aria-label={`${x} entfernen`} onClick={() => removeExcl(i)} style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: 0, display: "flex" }}><Icon d={ICONS.close} size={14} /></button>
                      </span>

                  </div>
                )}
              </section>

              <section style={{ display: "grid", gap: 10 }}>
                <SectionTitle>Datensicherung</SectionTitle>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button onClick={() => { exportData(); setMsg("Backup wurde heruntergeladen."); }} style={{ minHeight: 48, border: "1.5px solid var(--green)", borderRadius: 12, background: "transparent", color: COLORS.green, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Daten sichern</button>
                  <button onClick={() => importRef.current?.click()} style={{ minHeight: 48, border: "1.5px solid var(--line)", borderRadius: 12, background: COLORS.card, color: COLORS.ink, fontSize: 14.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Daten laden</button>
                </div>

                  onChange={(e) => { const f = e.target.files?.[0]; if (f) importData(f, (ok, n, err) => { if (ok) { setMsg(`${n} Einträge geladen — App wird neu geladen …`); setTimeout(() => location.reload(), 800); } else setMsg("Import fehlgeschlagen: " + err); }); e.target.value = ""; }} />
                <p style={{ fontSize: 12.5, color: COLORS.muted, lineHeight: 1.5, margin: "-2px 0 0" }}>
                  Sichert alle Einträge als Datei (ohne API-Key). Wichtig vor Gerätewechsel oder falls der Browser Daten löscht.

      </div>
