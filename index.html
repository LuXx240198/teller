/* ---------------- KI-Kochvorschläge ---------------- */

function SuggestSheet({ targets, day, onAdd, onClose, onChanged }) {
  const eaten = dayKcal(day);
  const remainCalc = {
    kcal: Math.max(0, r(targets.kcal) - eaten),
    protein: Math.max(0, r(targets.protein) - r(daySum(day, "protein"))),
    carbs: Math.max(0, r(targets.carbs) - r(daySum(day, "carbs"))),
    fat: Math.max(0, r(targets.fat) - r(daySum(day, "fat"))),
  };
  const [budget, setBudget] = useState(remainCalc);
  const [ingredients, setIngredients] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [results, setResults] = useState(null);
  const [saved, setSaved] = useState([]);
  const [savedKeys, setSavedKeys] = useState({});
  const [exclusions, setExclusions] = useState([]);
  const [logging, setLogging] = useState(null);
  const [flash, setFlash] = useState("");

  useEffect(() => { (async () => { setSaved(await loadJSON("suggestions", [])); setExclusions(await loadJSON("exclusions", [])); })(); }, []);

  const setB = (k) => (e) => setBudget({ ...budget, [k]: e.target.value });
  const overBudget = eaten > r(targets.kcal);

  async function run() {
    setBusy(true); setErr(""); setResults(null); setFlash("");
    try {
      const b = { kcal: r(budget.kcal), protein: r(budget.protein), carbs: r(budget.carbs), fat: r(budget.fat) };
      const list = await suggestMeals(b, ingredients, exclusions);
      setResults(list);
    } catch (e) { setErr("Konnte keine Vorschläge holen — bitte nochmal versuchen. (" + e.message + ")"); }
    finally { setBusy(false); }
  }

  async function saveSuggestion(item) {
    const k = item.name + "|" + item.kcal;
    if (savedKeys[k]) return;
    const withId = { ...item, id: "s" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5) };
    const next = [withId, ...saved];
    setSaved(next); setSavedKeys({ ...savedKeys, [k]: true });
    await saveJSON("suggestions", next); onChanged && onChanged();
  }
  async function removeSaved(id) {
    const next = saved.filter((s) => s.id !== id);
    setSaved(next); await saveJSON("suggestions", next); onChanged && onChanged();
  }
  async function confirmLog(mealId) {
    const item = logging; if (!item) return;
    const entry = { name: item.name, kcal: r(item.kcal), protein: r(item.protein), carbs: r(item.carbs), fat: r(item.fat), id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) };
    onAdd(mealId, entry);
    const label = (MEALS.find((m) => m.id === mealId) || {}).label || "";
    setLogging(null); setFlash(`„${item.name}" zu ${label} hinzugefügt ✓`);
  }

  const macroLine = (o) => `${r(o.protein)} P · ${r(o.carbs)} K · ${r(o.fat)} F`;

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(10,20,15,.5)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div className="sheet-in thin-scroll" onClick={(e) => e.stopPropagation()}
        style={{ background: COLORS.bg, width: "100%", maxWidth: 520, maxHeight: "92vh", overflowY: "auto", borderRadius: "24px 24px 0 0", padding: "16px 18px calc(28px + env(safe-area-inset-bottom))", boxSizing: "border-box" }}>
        <div style={{ width: 42, height: 4, borderRadius: 99, background: COLORS.line, margin: "0 auto 14px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
          <div className="display" style={{ fontSize: 23, color: COLORS.ink }}>🍳 Was kann ich kochen?</div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Schließen</button>
        </div>

        {logging ? (
          <div style={{ display: "grid", gap: 12 }}>
            <div style={{ fontSize: 14.5, color: COLORS.ink, lineHeight: 1.5 }}>
              Zu welcher Mahlzeit soll <strong>{logging.name}</strong> ({r(logging.kcal)} kcal)?
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {MEALS.map((m) => (
                <button key={m.id} onClick={() => confirmLog(m.id)}
                  style={{ minHeight: 56, border: "1.5px solid var(--line)", borderRadius: 14, background: COLORS.card, color: COLORS.ink, fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                  {m.emoji} {m.label}
                </button>
              ))}
            </div>
            <button onClick={() => setLogging(null)} style={{ minHeight: 44, border: "none", borderRadius: 12, background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, fontFamily: "inherit", cursor: "pointer" }}>Abbrechen</button>
          </div>
        ) : (
          <div style={{ display: "grid", gap: 14 }}>
            {flash && <div style={{ background: COLORS.greenSoft, color: COLORS.green, borderRadius: 12, padding: "10px 14px", fontSize: 13.5, fontWeight: 600 }}>{flash}</div>}

            {saved.length > 0 && (
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em", margin: "2px 0 8px" }}>Gemerkte Gerichte</div>
                <div style={{ display: "grid", gap: 6 }}>
                  {saved.map((s) => (
                    <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, background: COLORS.card, borderRadius: 12, padding: "10px 12px", border: "1px solid var(--line)" }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13.5, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</div>
                        <div style={{ fontSize: 12, color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>{r(s.kcal)} kcal · {macroLine(s)}</div>
                      </div>
                      <button onClick={() => setLogging(s)} style={{ border: "none", borderRadius: 99, background: COLORS.green, color: COLORS.onAccent, padding: "7px 12px", fontSize: 12.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", flexShrink: 0 }}>Gegessen</button>
                      <button aria-label={`${s.name} löschen`} onClick={() => removeSaved(s.id)} style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", flexShrink: 0, display: "flex" }}><Icon d={ICONS.close} size={15} /></button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <Card pad={14} style={{ background: COLORS.greenSoft, border: "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 13.5, fontWeight: 700, color: COLORS.ink }}>Übriges Budget</div>
                <button onClick={() => setBudget(remainCalc)} style={{ border: "none", background: "transparent", color: COLORS.green, fontSize: 12.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>aus heute</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                {[["kcal", "kcal"], ["protein", "Protein"], ["carbs", "KH"], ["fat", "Fett"]].map(([k, lbl]) => (
                  <label key={k} style={{ display: "block", minWidth: 0 }}>
                    <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.muted, marginBottom: 4, textAlign: "center" }}>{lbl}</div>
                    <input type="number" inputMode="numeric" value={budget[k]} onChange={setB(k)}
                      style={{ width: "100%", boxSizing: "border-box", minHeight: 44, padding: "8px 6px", border: "1.5px solid var(--line)", borderRadius: 10, fontSize: 15, fontFamily: "inherit", color: "var(--ink)", background: "var(--card)", outline: "none", textAlign: "center", fontVariantNumeric: "tabular-nums" }} />
                  </label>
                ))}
              </div>
              {overBudget && <div style={{ fontSize: 12, color: COLORS.amberInk, marginTop: 8, lineHeight: 1.4 }}>Du bist heute schon am Kalorienziel — die Werte kannst du oben frei anpassen.</div>}
            </Card>

            {!getApiKey() && <KeyHint />}

            <Field label="Welche Zutaten hast du da? (optional)">
              <textarea rows={2} style={{ ...inputStyle, resize: "vertical" }} value={ingredients} onChange={(e) => setIngredients(e.target.value)} placeholder="z. B. Joghurt, Proteinpulver, Haferflocken, Banane" />
            </Field>

            {exclusions.length > 0 && (
              <p style={{ fontSize: 12, color: COLORS.muted, lineHeight: 1.5, margin: "-6px 0 0" }}>
                Wird gemieden: {exclusions.join(", ")}. (In den Einstellungen änderbar.)
              </p>
            )}

            {busy ? (
              <div style={{ textAlign: "center", padding: "30px 0" }}>
                <div className="pulse display" style={{ fontSize: 19, color: COLORS.green }}>Claude sucht passende Gerichte …</div>
                <div style={{ fontSize: 13, color: COLORS.muted, marginTop: 6 }}>dauert ein paar Sekunden</div>
              </div>
            ) : (
              <button onClick={run}
                style={{ minHeight: 52, border: "none", borderRadius: 14, background: COLORS.green, color: COLORS.onAccent, fontSize: 16, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                {results ? "Neue Vorschläge holen" : "Vorschläge holen"}
              </button>
            )}

            {err && <div style={{ background: COLORS.berrySoft, color: COLORS.berry, borderRadius: 12, padding: "10px 14px", fontSize: 13, lineHeight: 1.45 }}>{err}</div>}

            {results && results.length > 0 && (
              <div style={{ display: "grid", gap: 10 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.muted, textTransform: "uppercase", letterSpacing: ".05em" }}>Vorschläge</div>
                {results.map((o, i) => {
                  const k = o.name + "|" + o.kcal;
                  const fits = r(o.kcal) <= r(budget.kcal) + 30;
                  return (
                    <Card key={i} pad={14}>
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 10, alignItems: "baseline" }}>
                        <div style={{ fontSize: 15, fontWeight: 700, minWidth: 0, overflowWrap: "anywhere" }}>{o.name}</div>
                        <div style={{ fontSize: 15, fontWeight: 700, color: fits ? "var(--green)" : "var(--berry)", flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>{r(o.kcal)} kcal</div>
                      </div>
                      <div style={{ fontSize: 12.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums", marginTop: 2 }}>{macroLine(o)}{o.portion ? ` · ${o.portion}` : ""}</div>
                      {o.note && <div style={{ fontSize: 13, color: COLORS.ink, lineHeight: 1.5, marginTop: 8 }}>{o.note}</div>}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 12 }}>
                        <button onClick={() => saveSuggestion(o)} disabled={!!savedKeys[k]}
                          style={{ minHeight: 44, border: `1.5px solid ${savedKeys[k] ? "var(--line)" : "var(--green)"}`, borderRadius: 12, background: "transparent", color: savedKeys[k] ? COLORS.muted : COLORS.green, fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: savedKeys[k] ? "default" : "pointer" }}>
                          {savedKeys[k] ? "Gemerkt ✓" : "⭐ Merken"}
                        </button>
                        <button onClick={() => setLogging(o)}
                          style={{ minHeight: 44, border: "none", borderRadius: 12, background: COLORS.green, color: COLORS.onAccent, fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>
                          Direkt eintragen
                        </button>
                      </div>
                    </Card>
                  );
                })}
                <p style={{ fontSize: 12, color: COLORS.muted, lineHeight: 1.5, margin: "2px 0 0" }}>
                  Werte sind KI-Schätzungen. „Merken" legt das Gericht oben ab — nach dem Kochen tippst du dort auf „Gegessen".
                </p>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- Haupt-App ---------------- */

function TellerApp() {
  const [loading, setLoading] = useState(true);
  const [profile, setProfile] = useState(null);
  const [theme, setTheme] = useState(localStorage.getItem("teller:theme") || "light");
  const [view, setView] = useState("home");
  const [date, setDate] = useState(new Date());
  const [day, setDay] = useState(emptyDay());
  const [water, setWater] = useState(0);
  const [weekConsumed, setWeekConsumed] = useState(0);
  const [sheet, setSheet] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showSuggest, setShowSuggest] = useState(false);
  const [suggestCount, setSuggestCount] = useState(0);
  const [undo, setUndo] = useState(null);
  const undoTimer = useRef(null);
  const key = dateKey(date);

  useEffect(() => { (async () => { setProfile(migrateProfile(await loadJSON("profile", null))); setLoading(false); })(); }, []);
  useEffect(() => { (async () => setSuggestCount((await loadJSON("suggestions", [])).length))(); }, []);
  const refreshSuggestCount = async () => setSuggestCount((await loadJSON("suggestions", [])).length);
  useEffect(() => { (async () => setDay(await loadJSON("day:" + key, emptyDay())))(); }, [key]);
  useEffect(() => { (async () => { const w = await loadJSON("water:" + key, 0); setWater(Number(w) || 0); })(); }, [key]);

  useEffect(() => {
    if (!profile || !profile.weekBudget) return;
    (async () => {
      const dts = weekDates(date);
      let sum = 0;
      for (const d of dts) { const dd = await loadJSON("day:" + dateKey(d), null); if (dd) sum += dayKcal(dd); }
      setWeekConsumed(sum);
    })();
  }, [key, profile, day]);

  function applyTheme(next) {
    setTheme(next);
    localStorage.setItem("teller:theme", next);
    document.documentElement.setAttribute("data-theme", next);
    const m = document.getElementById("theme-color-meta");
    if (m) m.setAttribute("content", next === "dark" ? "#101613" : "#EEF2EC");
  }

  async function addEntry(mealId, entry) {
    const next = { ...day, meals: { ...day.meals, [mealId]: [...(day.meals[mealId] || []), entry] } };
    setDay(next); await saveJSON("day:" + key, next);
  }
  async function removeEntry(mealId, id) {
    const entry = (day.meals[mealId] || []).find((e) => e.id === id);
    const next = { ...day, meals: { ...day.meals, [mealId]: (day.meals[mealId] || []).filter((e) => e.id !== id) } };
    setDay(next); await saveJSON("day:" + key, next);
    if (entry) { setUndo({ mealId, entry }); clearTimeout(undoTimer.current); undoTimer.current = setTimeout(() => setUndo(null), 5000); }
  }
  async function doUndo() {
    if (!undo) return;
    const u = undo; setUndo(null); clearTimeout(undoTimer.current);
    await addEntry(u.mealId, u.entry);
  }
  async function setWaterMl(v) {
    const nv = Math.max(0, v); setWater(nv); await saveJSON("water:" + key, nv);
  }
  async function copyYesterday() {
    const y = new Date(date.getTime() - 86400000);
    const yd = await loadJSON("day:" + dateKey(y), emptyDay());
    const merged = { meals: {} };
    MEALS.forEach((m) => {
      const cloned = (yd.meals[m.id] || []).map((e) => ({ ...e, id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) }));
      merged.meals[m.id] = [...(day.meals[m.id] || []), ...cloned];
    });
    setDay(merged); await saveJSON("day:" + key, merged);
  }
  async function saveProfile(p) { const mp = migrateProfile(p); setProfile(mp); await saveJSON("profile", mp); setShowSettings(false); }
  async function updateProfile(patch) { const mp = migrateProfile({ ...profile, ...patch }); setProfile(mp); await saveJSON("profile", mp); }

  if (loading) return <div className="pulse display" style={{ textAlign: "center", paddingTop: 120, fontSize: 22, color: "var(--green)" }}>Teller lädt …</div>;
  if (!profile) return <Onboarding onDone={saveProfile} />;

  const targets = profile.targets;
  const eaten = dayKcal(day);
  const dayEmpty = eaten === 0 && MEALS.every((m) => (day.meals[m.id] || []).length === 0);
  const waterGoal = derivedWaterGoal(profile);

  return (
    <div style={{ minHeight: "100vh", paddingBottom: "76px" }}>
      {/* Kopf */}
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "16px 16px 0", boxSizing: "border-box" }}>
        {view === "home" ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, gap: 8 }}>
            <button aria-label="Vorheriger Tag" onClick={() => setDate(new Date(date.getTime() - 86400000))} style={navBtnStyle}><Icon d={ICONS.chevL} size={18} /></button>
            <div style={{ textAlign: "center", minWidth: 0 }}>
              <div className="display" style={{ fontSize: 19, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{labelForDate(date)}</div>
              {dateKey(date) !== dateKey(new Date()) && (
                <button onClick={() => setDate(new Date())} style={{ border: "none", background: "transparent", color: COLORS.green, fontSize: 12.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: 2 }}>zu heute springen</button>
              )}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button aria-label="Nächster Tag" onClick={() => setDate(new Date(date.getTime() + 86400000))} style={navBtnStyle}><Icon d={ICONS.chevR} size={18} /></button>
              <button aria-label="Einstellungen" onClick={() => setShowSettings(true)} style={navBtnStyle}><Icon d={ICONS.gear} size={19} /></button>
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
            <div className="display" style={{ fontSize: 24 }}>{view === "weight" ? "Gewicht" : "Auswertung"}</div>
            <button aria-label="Einstellungen" onClick={() => setShowSettings(true)} style={navBtnStyle}><Icon d={ICONS.gear} size={19} /></button>
          </div>
        )}
      </div>

      {/* Inhalt */}
      <div className="fade-in" key={view} style={{ maxWidth: 480, margin: "0 auto", padding: "0 16px", boxSizing: "border-box" }}>
        {view === "home" && (
          <>
            <Card pad={22}>
              <Ring eaten={eaten} target={targets.kcal} />
              <div style={{ display: "flex", justifyContent: "center", gap: 26, marginTop: 14, fontSize: 13.5, color: COLORS.muted, fontVariantNumeric: "tabular-nums" }}>
                <span><strong style={{ color: COLORS.ink }}>{nf(eaten)}</strong> gegessen</span>
                <span>Ziel <strong style={{ color: COLORS.ink }}>{nf(targets.kcal)}</strong></span>
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 18 }}>
                <MacroBar label="Protein" val={daySum(day, "protein")} target={targets.protein} color="var(--green)" soft="var(--green-soft)" />
                <MacroBar label="Kohlenh." val={daySum(day, "carbs")} target={targets.carbs} color="var(--amber)" soft="var(--amber-soft)" />
                <MacroBar label="Fett" val={daySum(day, "fat")} target={targets.fat} color="var(--berry)" soft="var(--berry-soft)" />
              </div>
            </Card>

            <button onClick={() => setShowSuggest(true)}
              style={{ width: "100%", marginTop: 12, minHeight: 50, borderRadius: 14, border: "none", background: "var(--green-soft)", color: "var(--green)", fontSize: 15, fontWeight: 700, fontFamily: "inherit", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              🍳 Was kann ich kochen?
              {suggestCount > 0 && <span style={{ background: "var(--green)", color: "var(--on-accent)", borderRadius: 99, fontSize: 12, fontWeight: 700, padding: "2px 8px", fontVariantNumeric: "tabular-nums" }}>{suggestCount}</span>}
            </button>

            {profile.weekBudget && <WeekBudgetCard consumed={weekConsumed} budget={targets.kcal * 7} />}
            <WaterCard ml={water} goal={waterGoal} onAdd={(v) => setWaterMl(water + v)} onReset={() => setWaterMl(0)} />

            {dayEmpty && dateKey(date) === dateKey(new Date()) && (
              <button onClick={copyYesterday} style={{ width: "100%", marginTop: 12, minHeight: 46, borderRadius: 12, border: "1.5px dashed var(--line)", background: "transparent", color: COLORS.muted, fontSize: 14, fontWeight: 600, fontFamily: "inherit", cursor: "pointer" }}>
                ⧉ Gestern übernehmen
              </button>
            )}

            <div style={{ display: "grid", gap: 12, marginTop: 12 }}>
              {MEALS.map((m) => {
                const entries = day.meals[m.id] || [];
                const mealKcal = entries.reduce((a, e) => a + (Number(e.kcal) || 0), 0);
                const budget = Math.round(targets.kcal * m.share);
                return (
                  <Card key={m.id} pad={16}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 15.5, fontWeight: 700 }}>{m.emoji} {m.label}</div>
                        <div style={{ fontSize: 12.5, color: mealKcal > budget ? "var(--berry)" : "var(--muted)", fontVariantNumeric: "tabular-nums", marginTop: 2 }}>
                          {nf(mealKcal)} / {nf(budget)} kcal empfohlen
                        </div>
                      </div>
                      <button aria-label={`${m.label}: Essen hinzufügen`} onClick={() => setSheet(m.id)}
                        style={{ width: 44, height: 44, borderRadius: 99, border: "none", background: COLORS.green, color: COLORS.onAccent, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <Icon d={ICONS.plus} size={22} sw={2.2} />
                      </button>
                    </div>
                    {entries.length > 0 && (
                      <div style={{ marginTop: 10, borderTop: "1px solid var(--line)", paddingTop: 10, display: "grid", gap: 10 }}>
                        {entries.map((e) => (
                          <div key={e.id} style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 13.5, fontWeight: 500, lineHeight: 1.3, overflowWrap: "anywhere" }}>{e.name}</div>
                              <div style={{ fontSize: 12, color: COLORS.muted, fontVariantNumeric: "tabular-nums", marginTop: 1 }}>{r(e.kcal)} kcal · {r(e.protein)}P {r(e.carbs)}K {r(e.fat)}F</div>
                            </div>
                            <button aria-label={`${e.name} entfernen`} onClick={() => removeEntry(m.id, e.id)}
                              style={{ border: "none", background: "transparent", color: COLORS.muted, cursor: "pointer", padding: "2px 4px", flexShrink: 0, display: "flex" }}>
                              <Icon d={ICONS.close} size={16} />
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                );
              })}
            </div>

            <p style={{ textAlign: "center", fontSize: 12, color: COLORS.muted, marginTop: 20, lineHeight: 1.5 }}>
              Foto- und Textwerte sind KI-Schätzungen — als Trend über Tage zuverlässig, im Einzelfall gerne nachjustieren.
            </p>
          </>
        )}

        {view === "weight" && <WeightTab profile={profile} onUpdateProfile={updateProfile} />}
        {view === "month" && <MonthTab profile={profile} />}
      </div>

      {/* Rückgängig-Toast */}
      {undo && (
        <div className="toast-in" style={{ position: "fixed", left: "50%", transform: "translateX(-50%)", bottom: "calc(84px + env(safe-area-inset-bottom))", zIndex: 55, background: "var(--ink)", color: "var(--bg)", borderRadius: 99, padding: "10px 12px 10px 18px", display: "flex", alignItems: "center", gap: 12, boxShadow: "var(--shadow-lg)", maxWidth: "calc(100% - 32px)" }}>
          <span style={{ fontSize: 13.5, fontWeight: 600 }}>Eintrag gelöscht</span>
          <button onClick={doUndo} style={{ border: "none", background: "var(--green)", color: "var(--on-accent)", borderRadius: 99, padding: "7px 14px", fontSize: 13.5, fontWeight: 700, fontFamily: "inherit", cursor: "pointer" }}>Rückgängig</button>
        </div>
      )}

      <BottomNav view={view} setView={setView} />

      {sheet && <AddSheet mealId={sheet} onAdd={addEntry} onClose={() => setSheet(null)} features={profile.features} />}
      {showSuggest && <SuggestSheet targets={targets} day={day} onAdd={addEntry} onClose={() => { setShowSuggest(false); refreshSuggestCount(); }} onChanged={refreshSuggestCount} />}
      {showSettings && <Settings profile={profile} theme={theme} onToggleTheme={() => applyTheme(theme === "dark" ? "light" : "dark")} onSave={saveProfile} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TellerApp />);
</script>
</body>
</html>
